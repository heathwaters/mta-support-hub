  {id:80,c:"USTA / Ratings / UTR",h:"LIVE",p:"Low",sc:"/utr-connect",
    q:`How do I connect my UTR account to Match Tennis App?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! Here are the steps to connect your UTR account:

1. Open the Match Tennis App
2. Navigate to "My Account" from the main menu
3. Tap on "Connected Accounts"
4. Under the "UTR Sports" line, use the dropdown menu to select the player associated with your UTR subscription
5. Click the "Connect" button

This will open a new window to the UTR website and ask you to authorize Match Tennis App to view UTR. Click Authorize, then close that window and return to Match Tennis App and click the refresh button on the UTR Sports section.

Note: You can view UTR decimal ratings within Match Tennis App if you have a UTR Power subscription and a Match Tennis App premium subscription. If you have a free UTR account, you will see only integer ratings.`,vr:`ADMIN PANEL STEPS (if self-service linking fails):
1. Ask customer for their email and UTR ID

2. What player are you trying to connect?`,at:`UTR Power subscription is required for decimal ratings. Free UTR only shows integers. The discount code PLAYTIME20 can be used at https://www.utrsports.net/pages/power-perks for a discount on UTR Power.`},

  {id:85,c:"Technical Issues / Errors",h:"LIVE",p:"Low",sc:"/cache-clear",
    q:`How do I clear the cache or browser data? (Device specific steps)`,cr:`Hi {name}, thank you for contacting Match Tennis Support! Here are the steps to clear cache based on your device:

iPhone/Safari:
1. Open Settings, scroll down and tap Safari
2. Tap "Clear History and Website Data"
3. Confirm by tapping "Clear History and Data"

Chrome Browser:
1. Choose Chrome in the top bar
2. Click Clear Browsing Data
3. Choose Cookies and Site Data, Cached Images and Files
4. Click Clear Browsing Data

Safari (Desktop):
1. Click Safari drop down menu and select Preferences
2. Click the Advanced tab, select "Show Develop menu in menu bar"
3. Select the Develop drop down menu
4. Click Empty Cache

Android:
1. Click on Settings on your Android home screen
2. Click on Apps
3. Find Match Tennis
4. Click on Storage
5. Then click Clear Cache and Storage
6. Launch the app again and log in

  {id:87,c:"Technical Issues / Errors",h:"LIVE",p:"Low",sc:"/resetapp",

  {id:89,c:"USTA / Ratings / UTR",h:"LIVE",p:"Low",sc:"/points-missing",
    q:`Why is a tournament not showing in my rankings/player record? Points seem missing.`,cr:`Hi {name}, thank you for contacting Match Tennis Support! The tournament your player competed in may not be showing because it was not one of the top 6 results within the past 12 months. USTA only includes points from the top 6 tournaments when displaying a specific age group ranking.

Our site pulls data directly from USTA, so the information shown in Ranking Snapshots and Player Records matches their records exactly. For age group rankings, only the best 6 singles and best 6 doubles results are counted. That is why the tournament you are looking for may not appear in the snapshot.

At the top of the Ranking Snapshot and Player Record pages, you will see this note: "Important: Results come directly from the USTA.com National Combined list player record."

To view the top 6 points results on the USTA site: Go to the player's profile page, open the Results tab, then use the filters to select Competition Category and choose Rank List.

If the tournament is also missing from all match results on the USTA site, you will need to contact USTA directly for further assistance.`,vr:`ADMIN PANEL STEPS (if needed):
1. Ask for player name and USTA number
2. Go to Admin Panel > Account Search
3. Check the player profile for current ratings
4. Click "Update UTR Rating" if a resync is needed

Start with the scripted response. Only use admin if there's a specific data issue.`,es:`If the tournament IS showing on USTA but NOT in our app, create a support ticket for a data sync investigation.`,fu:`1. What is the player name and USTA number?
2. Which tournament are you looking for?
3. Have you checked if it appears on the USTA website directly?`,at:`This is a very common question from parents. The key point is that USTA only counts the TOP 6 tournament results for rankings. If a tournament result was not in the player's top 6, it will not appear. Our data mirrors USTA exactly. Direct them to check USTA.com first.`},

  {id:47,c:"Printing / Exporting",h:"LIVE",p:"Low",sc:"/mtt-export-data",

This is a how-to question. The scripted response covers it.

2. Are you a league coordinator or team captain?`,at:`VA Agent provides general export info. Live Agent can generate custom exports from admin.`},
  {id:48,c:"Feature Requests",h:"LIVE",p:"Low",sc:"/mtt-feature-request",
    q:`I have a suggestion for a new feature on Match Tennis Team.`,cr:`Hi {name}, thank you for contacting Match Tennis Support! We love hearing from our community! I would be happy to submit your feature request to our product team. Could you please describe the feature you'd like to see? The more detail you can provide, the better our team can evaluate it.

Once you share the details, I will create a feature request ticket and send it to our product team for review.`,vr:`ADMIN PANEL STEPS:
1. Ask the customer to describe the feature they want in detail

3. Go to the Create Ticket tab
4. Fill in the customer's info
5. In the Issue Summary, write "FEATURE REQUEST:" followed by a clear description of what the customer wants
6. Copy and submit the ticket
7. Tell the customer: "I've submitted your feature request to our product team. They review all submissions and use them to prioritize future updates. Thank you for helping us improve!"

Do NOT send the customer to Settings > Feedback. We collect feature requests through support tickets.`,es:`Always create a support ticket for feature requests. Include the customer's description of the feature and why they want it.`,fu:`1. Can you describe the feature you would like to see?
2. How would this help your team or league?`,at:`Always create a support ticket with the feature request details. Do NOT direct customers to Settings > Feedback. We want to capture all feature requests through our ticketing system so the product team can track and prioritize them.`},

  {id:60,c:"General How-To Questions",h:"LIVE",p:"Low",sc:"/contact-td-mtt",
    q:`How do I contact the tournament director for my team event?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! The Tournament Director will be able to answer this question for you. Please follow these instructions to contact them through the app:

1. Log into Match Tennis Team
2. Click on the menu
3. Hit the "Events" button on the menu
4. From here, click the "Email Director" option to email the director

If you need further assistance after communicating with the Director, we will be here to assist.`,vr:`ADMIN PANEL STEPS:
1. Ask customer for the Tournament ID
2. Go to Admin Panel > Tournament Lookup
3. Search by Tournament ID
4. Click "Copy Waiver Link"
5. Paste the link into tawk.to chat

If the tournament doesn't have a waiver link, create a support ticket with the Tournament ID.`,es:`N/A. Direct to tournament director.`,fu:``,at:`We do not make tournament or event decisions. Always direct to the tournament director.`},
  {id:61,c:"Registration / Account Creation",h:"LIVE",p:"Low",sc:"/registration-mtt",
    q:`How do I register for a team event on Match Tennis Team? (Detailed steps)`,cr:`Hi {name}, thank you for contacting Match Tennis Support! Here is how to register:

If you do NOT have an account yet:
1. Go to MatchTennisTeam.com and click Registration in the menu
2. Select your USTA Section and locate the tournament in the list
3. On the tournament information page, scroll to the Registration section and click Register
4. Complete the registration form and submit
5. Download the Match Tennis TEAM app and login with the credentials you created

If you ALREADY have a username/password:
1. Open the App and tap the menu toggle (top left corner)
2. Select Registrations from the menu
3. Use the Organization filter at the top to find your section
4. Locate the tournament you want and tap Register
5. Fill out the form on the registration page and submit

IMPORTANT: Please make sure you download the Match Tennis TEAM app, not the Match Tennis App. We have two separate apps: one for individual events and one for team events.

You can also find registration links at: https://matchtennisteam.com/#tourn_registration_links`,vr:`ADMIN PANEL STEPS (if needed):
1. This is primarily a how-to question answerable from the scripted response
2. If the customer is having trouble, ask for their email
3. Go to Admin Panel > Account Search to verify their account exists
4. Troubleshoot from there based on what you find

The scripted response should handle most cases. Admin panel is backup.`,es:`If registration errors occur, create a support ticket with event details.`,fu:`1. What is the date and state of your event?
2. Do you already have a Match Tennis Team account?`,at:`Many parents download the wrong app. Always emphasize Match Tennis TEAM, not Match Tennis App. The two are separate. If they cannot find their event on the registration page, ask for date and state so you can provide the direct link.`},
  {id:62,c:"Captain / Admin / Permissions",h:"LIVE",p:"Low",sc:"/captain-privileges",
    q:`How do I grant co captain privileges to another player on my team?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! You can grant a player co captain privileges by following these steps:

1. Log in to Match Tennis Team
2. Click on the "Team" button on the top menu (or from your app menu select "Teams")
3. Find the player profile card you want to grant co captain privileges
4. Click the "C" button under their name
5. When the prompt pops up, confirm to grant co captain privileges

You can do this for as many players as needed. Any player you grant co captain privileges will be able to create and submit lineups and use mass communications for the team.`,vr:`ADMIN PANEL STEPS:
1. Ask customer for their email and team name
2. Go to Admin Panel > Account Search (MTT tab)
3. Search by email to find their account
4. Check their team membership and role

If changes are needed (captain change, roster edits, deadline extensions), create a support ticket. You cannot make these changes from the admin panel.`,es:`N/A, self service for captains.`,fu:``,at:`Only the current team captain can grant co captain privileges. Co captains can submit lineups and send team messages.`},
  {id:63,c:"Technical Issues / Errors",h:"LIVE",p:"Low",sc:"/team-download",
    q:`Where do I download the Match Tennis Team app?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! Please choose your device type to download the Match Tennis Team App:

For iPhone/iOS: https://apps.apple.com/us/app/match-tennis-team/id1298091774#?platform=iphone

For Android: https://play.google.com/store/apps/details?id=com.teamx.team

Web App (works on any device): https://www.matchtennisteam.com/baseapp/

IMPORTANT: Make sure you download "Match Tennis Team," NOT "Match Tennis App." We have two separate apps: one for team events and one for individual tournaments.`,vr:`ADMIN PANEL STEPS (if troubleshooting doesn't work):
1. Walk through all scripted troubleshooting steps first
2. If issue persists, ask for their email
3. Go to Admin Panel > Account Search
4. Verify the account exists and is active
5. Check if there are any obvious account issues

If the technical issue can't be resolved, create a support ticket with: device type, OS version, app version, description of the issue, and what troubleshooting was already tried.`,es:`N/A, general information.`,fu:`What type of device are you using?`,at:`This is the most common confusion. Parents often download Match Tennis App instead of Match Tennis Team. Always emphasize they need the TEAM app.`},
  {id:64,c:"General How-To Questions",h:"LIVE",p:"Low",sc:"/captains-tutorial",
    q:`Is there a tutorial or guide for team captains?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! Yes, we have several resources for team captains:

Captain Best Practices & Tutorials Document:
https://docs.google.com/document/d/19YJc8nLIzab_IIFtWcbw9mJbr1I5p5-nJPCFdDJF7yM/edit

Short Video Tutorial covering the four primary interactions (lineup submission, score reporting, communications, match management):
https://matchtennisteam.s3.amazonaws.com/MTT-CAPTAINS_TUT_SHORT.mp4

These cover everything captains need to know for managing their team through the app.`,vr:`NO ADMIN PANEL NEEDED (usually).
Most how-to questions are answered by the scripted response.

If the customer needs specific account help:
1. Ask for their email
2. Go to Admin Panel > Account Search
3. Look up their account to provide personalized assistance`,es:`N/A, general information.`,fu:`Is there a specific feature you need help with?`,at:`The video tutorial is short and covers the main captain actions. Great to send to new captains before their first event.`},
  {id:65,c:"Scoring / Reporting Match Results",h:"LIVE",p:"Low",sc:"/team-score-report",
    q:`How do captains or players report team match scores?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! Here is how to report scores for team matches:

1. Tap the Matches icon in the top menu
2. Tap the "Match Card" icon of the respective match
3. Tap on the text box of the respective match with the text "Report Score"
4. The Score Form window will appear
5. Enter "win, loss, delay" from the dropdown for the respective team player
6. Enter each set score for each team (next set fields will appear after entering the previous set)
7. Tap the "Update" button

Demo Video: https://www.matchtennisteam.com/baseapp/help/video.php?fname=scorereporting.mp4

We encourage the players to do this so the score is fresh in their minds, but captains can also do it for them. The score is entered automatically for both teams based on the first team that enters the score. If there is a discrepancy, notify the tournament director and they will resolve it.`,vr:`ADMIN PANEL STEPS:
1. Ask for tournament name, match details, player names
2. Go to Admin Panel > Account Search to verify the customer's account
3. You CANNOT edit scores from the admin panel
4. Create a support ticket for score corrections

Always create a ticket for score issues. Include: tournament, match date, both player names, incorrect score, correct score.`,es:`If score reporting form has technical issues, create a support ticket.`,fu:`Are you reporting as a captain or a player?`,at:`Either players or captains can report scores. The first team to enter the score fills it in for both sides automatically. Disputes go to the tournament director.`},
  {id:66,c:"General How-To Questions",h:"LIVE",p:"Low",sc:"/view-other-teams",
    q:`How do I view other teams' rosters for an upcoming tournament?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! To view other teams entered in your upcoming tournament:

1. Login to Match Tennis Team
2. Click the top menu
3. Click on the "Events" option
4. Then click the "Teams" button
5. On the dropdown, select any team you would like to view

Note: If you do not see the other team's roster, then the tournament director has not enabled this feature for the event.`,vr:`ADMIN PANEL STEPS:
1. Ask customer for the Tournament ID
2. Go to Admin Panel > Tournament Lookup
3. Search by Tournament ID
4. Click "Copy Waiver Link"
5. Paste the link into tawk.to chat

If the tournament doesn't have a waiver link, create a support ticket with the Tournament ID.`,es:`N/A, general information.`,fu:``,at:`Not all tournaments allow roster viewing. This is controlled by the tournament director. If a parent cannot see rosters, it is likely intentionally disabled for that event.`},
  {id:67,c:"Technical Issues / Errors",h:"LIVE",p:"Low",sc:"/mtt-login",
    q:`I cannot log in to Match Tennis Team. What is the login link?`,cr:`Hi {name}, thank you for contacting Match Tennis Support! If you have already registered, you need to go to the login page:

https://www.matchtennisteam.com/baseapp/

Use the username (your email address) and password you created when you registered.

IMPORTANT: Make sure you are logging into Match Tennis Team, NOT Match Tennis App. We have two separate apps.

Here are the download links:
iOS: https://apps.apple.com/us/app/match-tennis-team/id1298091774
Android: https://play.google.com/store/apps/details?id=com.teamx.team
Web: https://www.matchtennisteam.com/baseapp/`,vr:`ADMIN PANEL STEPS:
1. Ask customer for their email address
2. Go to Admin Panel > Account Search
3. Search by email to locate the account
4. Check account status (active, locked, failed attempts)
5. If locked: Click "Unlock Account" and "Clear Failed Logins"
6. Click "Send Password Reset" to generate a reset link
7. Copy the reset link
8. Paste the reset link directly into the tawk.to chat for the customer

If the scripted response resolves it, no admin panel needed. Use admin panel only if they still can't get in.`,es:`If they cannot log in after confirming correct credentials, create a support ticket.`,fu:`1. Have you registered for the team event already?
2. Are you sure you are using the Match Tennis Team app and not Match Tennis App?`,at:`The most common issue is parents trying to log into the wrong app. Always confirm they are using Match Tennis TEAM.`},
  {id:70,c:"Registration / Account Creation",h:"LIVE",p:"Low",sc:"/mta-usta-not-found",
    q:`I am trying to register but it says my USTA number is not found.`,cr:`Hi {name}, thank you for contacting Match Tennis Support! That usually means there is a mismatch between the number you entered and what is in the USTA database. Please double check the number and try again. Common causes include: a typo, an expired USTA membership, or a name mismatch. If it still does not work, I can connect you with a specialist to look it up.`,vr:`ADMIN PANEL STEPS:
1. Ask customer for their USTA number and full name
2. Go to Admin Panel > Account Search
3. Search by USTA number to see if it exists in our system
4. If not found: Search by name to check for alternate entries
5. Verify the USTA number format is correct (should be 8 digits)

If the USTA number is valid but not in our system, create a support ticket to have the player manually added. Collect: player name, USTA number, city, state, date of birth, age division.`,es:`If USTA number cannot be verified or resolved, Create support ticket. Collect: Name, Email, Player's name, City, State, USTA number, Issue summary.`,fu:`1. What USTA number are you entering?
2. Is this a new USTA membership or one you have had for a while?
3. Have you recently renewed your USTA membership?`,at:`VA Agent provides common causes and self-service steps. If unresolved, Live Agent looks up in admin panel and USTA database.`},

const TFIELDS=[
{key:"fullName",label:"Full Name",required:true,placeholder:"John Smith"},
{key:"email",label:"Email",required:true,placeholder:"john@example.com",type:"email"},
{key:"playerName",label:"Player Name",required:true,placeholder:"Jane Smith"},
{key:"city",label:"City",required:true,placeholder:"Orlando"},
{key:"state",label:"State",required:true,placeholder:"FL"},
{key:"ustaNumber",label:"USTA Number",required:true,placeholder:"12345678"},
{key:"issueSummary",label:"Issue Summary",required:true,placeholder:"Description and what was tried",ml:true},
{key:"product",label:"Product",required:true,opts:["MTA (Match Tennis App)","MTT (Match Tennis Team)"]},
{key:"category",label:"Category",required:true,opts:["Password Reset / Login","Registration","USTA / Ratings / UTR","Billing / Subscription","Brackets / Draw","Scoring","Players","How-To","Missing Data","Notifications","Technical","Privacy","Lineup","Captain / Admin","Scheduling","Standings","Team Setup","Roster","League Setup","Feature Requests","Other"]},
{key:"priority",label:"Priority",required:true,opts:["Low","Medium","High","Urgent"]},
{key:"tried",label:"What was tried",required:true,placeholder:"Walked through troubleshooting steps with customer.",ml:true}
];

function AdminPanel(){
  const[ap,setAp]=useState("MTA");
  const[q,setQ]=useState("");
  const[r,setR]=useState(null);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null);
  const[tq,setTq]=useState("");
  const[tr,setTr]=useState(null);
  const[eq,setEq]=useState("");
  const[er,setEr]=useState(null);

  const doSearch=()=>{
    if(!q.trim())return;
    setLoading(true);setMsg(null);setR(null);
    setTimeout(()=>{
      setR({demo:true,name:"Demo Account",email:q,status:"active",attempts:0,privacy:"public",
        players:[{name:"Demo Player",usta:"12345678",div:"14s",utr:"5.23",ntrp:"4.0",shirt:"AM"}]});
      setLoading(false);
      setMsg({t:"w",m:"Demo data. Connect your API to see real accounts."});
    },600);
  };

  const doAction=(label)=>{
    setMsg({t:"i",m:label+"..."});
    setTimeout(()=>setMsg({t:"w",m:"API not connected. This will work once your developer builds the endpoint."}),500);
  };

  const doTSearch=()=>{
    if(!tq.trim())return;
    setTr({demo:true,id:tq,name:"Demo Tournament",dates:"April 12-14, 2026",loc:"Orlando, FL",dir:"Director Name",
      link:"https://www.matchtennisapp.com/baseapp/checkin?tid="+tq});
    setMsg({t:"w",m:"Demo data."});
  };

  const doESearch=()=>{
    if(!eq.trim())return;
    setEr([{demo:true,name:"Demo Team Event",state:eq.toUpperCase(),dates:"April 19-20, 2026",
      link:"https://matchtennisteam.com/#tourn_registration_links"}]);
    setMsg({t:"w",m:"Demo data."});
  };

  const msgBg={s:"var(--green-light)",e:"var(--rose-light)",i:"var(--blue-light)",w:"var(--amber-light)"};
  const msgC={s:"var(--green-dark)",e:"var(--rose)",i:"var(--blue)",w:"var(--amber)"};
  const msgBd={s:"#86EFAC",e:"#FECDD3",i:"#93C5FD",w:"#FDE68A"};

  return (
    <div style={{maxWidth:960,margin:"0 auto",padding:"16px 24px"}}>
      <div style={{background:"#FEF3C7",border:"1px solid #FDE68A",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>🔌</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#92400E"}}>API Not Connected — Preview Mode</div>
          <div style={{fontSize:12,color:"#78350F"}}>This admin panel is fully built and ready. Once your developer creates the API endpoints, change one line of code and it connects to real data. Click around to see how it works.</div>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <div style={{display:"flex",background:"var(--card)",borderRadius:10,padding:3,border:"1px solid var(--border)"}}>
          {["MTA","MTT"].map(p=>(
            <button key={p} onClick={()=>{setAp(p);setR(null);setTr(null);setEr(null);setMsg(null);setQ("")}}
              style={{padding:"8px 20px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",
                background:ap===p?"var(--green)":"transparent",color:ap===p?"#fff":"var(--text3)"}}>
              {p==="MTA"?"🎾 Match Tennis App":"👥 Match Tennis Team"}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div>
          <div style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",boxShadow:"var(--shadow)",overflow:"hidden"}}>
            <div style={{background:"var(--green-dark)",padding:"10px 16px",color:"#fff"}}>
              <div style={{fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif"}}>🔍 Account Search</div>
              <div style={{fontSize:10,opacity:.7}}>Search by email, name, or USTA number</div>
            </div>
            <div style={{padding:16}}>
              <div style={{display:"flex",gap:6}}>
                <input type="text" placeholder={ap==="MTA"?"Email, name, or USTA#...":"Email, name, or team..."} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
                  style={{flex:1,padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}} />
                <button onClick={doSearch} style={{padding:"10px 18px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,background:"var(--green)",color:"#fff",fontFamily:"'Outfit',sans-serif"}}>
                  {loading?"...":"Search"}
                </button>
              </div>

              {msg && <div style={{marginTop:10,padding:"8px 12px",borderRadius:8,fontSize:12,background:msgBg[msg.t],color:msgC[msg.t],border:"1px solid "+msgBd[msg.t]}}>{msg.m}</div>}

              {r && (
                <div className="fade-in" style={{marginTop:14}}>
                  <div style={{background:"var(--bg)",borderRadius:10,padding:14,border:"1px solid var(--border)"}}>
                    {r.demo && <div style={{fontSize:9,color:"var(--amber)",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>⚠️ Demo Data</div>}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:10}}>
                      <div>
                        <div style={{fontSize:16,fontWeight:700,fontFamily:"'Outfit',sans-serif"}}>{r.name}</div>
                        <div style={{fontSize:12,color:"var(--text3)"}}>{r.email}</div>
                      </div>
                      <span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,
                        background:r.status==="active"?"var(--green-light)":"var(--rose-light)",
                        color:r.status==="active"?"var(--green-dark)":"var(--rose)"}}>{r.status}</span>
                    </div>
                    <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>
                      <strong>Failed logins:</strong> {r.attempts} · <strong>Privacy:</strong> {r.privacy}
                    </div>
                    {r.players.map((p,i)=>(
                      <div key={i} style={{background:"var(--card)",borderRadius:8,padding:10,border:"1px solid var(--border)",marginBottom:6}}>
                        <div style={{fontSize:12,fontWeight:600}}>{p.name}</div>
                        <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>
                          USTA: {p.usta} · Div: {p.div||"—"} · UTR: {p.utr||"—"} · NTRP: {p.ntrp||"—"}{ap==="MTT"&&p.shirt?" · Shirt: "+p.shirt:""}
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{marginTop:12}}>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Actions</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <button onClick={()=>doAction("Sending password reset")} style={{padding:10,border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--card)",color:"var(--green-dark)",textAlign:"left"}}>🔑 Send Password Reset</button>
                      <button onClick={()=>doAction("Unlocking account")} style={{padding:10,border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--card)",color:"var(--green-dark)",textAlign:"left"}}>🔓 Unlock Account</button>
                      <button onClick={()=>doAction("Clearing failed logins")} style={{padding:10,border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--card)",color:"var(--green-dark)",textAlign:"left"}}>🗑️ Clear Failed Logins</button>
                      {ap==="MTA" && <button onClick={()=>doAction("Triggering UTR resync")} style={{padding:10,border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--card)",color:"var(--green-dark)",textAlign:"left"}}>📊 Update UTR Rating</button>}
                      {ap==="MTA" && <button onClick={()=>doAction("Setting to private")} style={{padding:10,border:"1px solid var(--amber-light)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--amber-light)",color:"var(--amber)",textAlign:"left"}}>🔒 Set to Private (6mo lock)</button>}
                      {ap==="MTA" && <button onClick={()=>doAction("Updating age division")} style={{padding:10,border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--card)",color:"var(--green-dark)",textAlign:"left"}}>📋 Add Age Division</button>}
                      {ap==="MTT" && <button onClick={()=>doAction("Updating NTRP")} style={{padding:10,border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--card)",color:"var(--green-dark)",textAlign:"left"}}>📊 Update NTRP Rating</button>}
                      {ap==="MTT" && <button onClick={()=>doAction("Updating T-shirt")} style={{padding:10,border:"1px solid var(--border)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,background:"var(--card)",color:"var(--green-dark)",textAlign:"left"}}>👕 Update T-Shirt Size</button>}
                    </div>
                  </div>

              Billing, refunds, cancellations, merges, deletions, score edits

}

function App(){
