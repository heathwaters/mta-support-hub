input,select,textarea,button{font-family:inherit}

[role="option"]{transition:background .15s,box-shadow .15s,border-color .15s;touch-action:manipulation;-webkit-tap-highlight-color:rgba(45,106,79,.2)}
[role="option"]:hover:not([aria-selected="true"]){background:var(--green-light)!important}
[role="option"]:focus-visible{outline:3px solid var(--green);outline-offset:2px}
@media (max-width:600px){
  [role="option"]{min-height:44px;padding:10px 12px!important}
  [role="option"] button{min-height:36px;min-width:44px;font-size:12px!important;padding:8px 12px!important}
  [data-players-toggle]{font-size:13px!important;padding:8px 14px!important;min-height:36px}
  [data-players-counter]{font-size:12px!important}
  [role="option"] [data-player-name]{font-size:13px!important}
  [role="option"] [data-player-chip]{font-size:11px!important;padding:3px 10px!important}
}

  {id:56,c:"Notifications / Alerts",h:"LIVE",p:"Low",sc:"/mta-not-getting-notifs",
    q:`I am not receiving any notifications from the app.`,cr:`There are a couple of reasons you may not be receiving notifications:

1. You may not have completed the tournament waiver/pre-tournament check-in. Notifications are sent to players who have completed the waiver form. If you haven't done this yet, I can get you the waiver link. Just provide me with the Tournament ID.

2. Your phone notification settings may need to be updated:
   For iPhone: Go to Settings > Notifications > Match Tennis > Enable All
   For Android: Go to Settings > Apps > Match Tennis > Notifications > Enable

3. In the app, go to Settings > Notifications and make sure your preferred notifications are toggled on (tournament updates, court assignments, score reporting)

4. Make sure Do Not Disturb is turned off on your device

Could you let me know which tournament you are expecting notifications from? I can check if you need to complete the waiver and get you the link.`,vr:`ADMIN PANEL STEPS:
1. Ask the customer which tournament they are expecting notifications from
2. Ask for the Tournament ID
3. Go to Admin Panel > Tournament Lookup
4. Search by Tournament ID
5. Click "Copy Waiver Link"
6. Paste the waiver link into tawk.to chat
7. Tell the customer: "You may need to complete the tournament waiver to receive notifications. Here is the link: [paste link]"

If they have already completed the waiver and notifications still aren't working, walk them through the phone notification settings in the scripted response. If still not working after all steps, create a support ticket.`,es:`If notifications still not working after troubleshooting, Create support ticket. Collect: Name, Email, Issue summary.`,fu:`If notifications still not working after troubleshooting, Create support ticket. Collect: Name, Email, Issue summary.`,at:`The most common reason for not receiving notifications is that the player has not completed the tournament waiver/VTD check-in form. Always ask which tournament first and send the waiver link. Phone notification settings are the second most common cause.`},

  {id:80,c:"USTA / Ratings / UTR",h:"LIVE",p:"Low",sc:"/utr-connect",
    q:`How do I connect my UTR account to Match Tennis App?`,cr:`Here are the steps to connect your UTR account:

  {id:85,c:"Technical Issues / Errors",h:"LIVE",p:"Low",sc:"/cache-clear",
    q:`How do I clear the cache or browser data? (Device specific steps)`,cr:`Here are the steps to clear cache based on your device:

iPhone/Safari:
1. Open Settings, scroll down and tap Safari
2. Tap "Clear History and Website Data"
3. Confirm by tapping "Clear History and Data"

Chrome Browser:
1. Choose Chrome in the top bar
2. Click Clear Browsing Data
3. Choose Cookies and Site Data, Cached Images and Files
4. Click Clear Browsing Data

Safari (Desktop):
1. Click Safari drop down menu and select Preferences
2. Click the Advanced tab, select "Show Develop menu in menu bar"
3. Select the Develop drop down menu
4. Click Empty Cache

Android:
1. Click on Settings on your Android home screen
2. Click on Apps
3. Find Match Tennis
4. Click on Storage
5. Then click Clear Cache and Storage
6. Launch the app again and log in

After clearing the cache, please try your action again and let us know if the issue is resolved.`,vr:`ADMIN PANEL STEPS (if troubleshooting doesn't work):

  {id:87,c:"Technical Issues / Errors",h:"LIVE",p:"Low",sc:"/resetapp",
    q:`The app is not displaying correctly or showing old data. How do I refresh/reload it?`,cr:`It sounds like you might need to refresh your application templates. Please follow these steps:

3. This action will refresh your app templates and force you to login again
4. Enter your username and password and try the action again

1. Press and hold the app icon for 2 seconds until it starts shaking
2. Click the "X" to delete

4. Completely remove Match Tennis App from your device
5. Go to the app store and perform a fresh reinstall/download
6. Open the new Match Tennis App and login again

  {id:89,c:"USTA / Ratings / UTR",h:"LIVE",p:"Low",sc:"/points-missing",
    q:`Why is a tournament not showing in my rankings/player record? Points seem missing.`,cr:`The tournament your player competed in may not be showing because it was not one of the top 6 results within the past 12 months. USTA only includes points from the top 6 tournaments when displaying a specific age group ranking.

Our site pulls data directly from USTA, so the information shown in Ranking Snapshots and Player Records matches their records exactly. For age group rankings, only the best 6 singles and best 6 doubles results are counted. That is why the tournament you are looking for may not appear in the snapshot.

At the top of the Ranking Snapshot and Player Record pages, you will see this note: "Important: Results come directly from the USTA.com National Combined list player record."

To view the top 6 points results on the USTA site: Go to the player's profile page, open the Results tab, then use the filters to select Competition Category and choose Rank List.

If the tournament is also missing from all match results on the USTA site, you will need to contact USTA directly for further assistance.`,vr:`ADMIN PANEL STEPS (if needed):
1. Ask for player name and USTA number
2. Go to Admin Panel > Account Search
3. Check the player profile for current ratings
4. Click "Update UTR Rating" if a resync is needed

Start with the scripted response. Only use admin if there's a specific data issue.`,es:`If the tournament IS showing on USTA but NOT in our app, create a support ticket for a data sync investigation.`,fu:`1. What is the player name and USTA number?
2. Which tournament are you looking for?
3. Have you checked if it appears on the USTA website directly?`,at:`This is a very common question from parents. The key point is that USTA only counts the TOP 6 tournament results for rankings. If a tournament result was not in the player's top 6, it will not appear. Our data mirrors USTA exactly. Direct them to check USTA.com first.`},

  {id:44,c:"Website / Public Page / Sharing",h:"LIVE",p:"Low",sc:"/mtt-public-page",

  {id:47,c:"Printing / Exporting",h:"LIVE",p:"Low",sc:"/mtt-export-data",

  {id:48,c:"Feature Requests",h:"LIVE",p:"Low",sc:"/mtt-feature-request",
    q:`I have a suggestion for a new feature on Match Tennis Team.`,cr:`We love hearing from our community! I would be happy to submit your feature request to our product team. Could you please describe the feature you'd like to see? The more detail you can provide, the better our team can evaluate it.

Once you share the details, I will create a feature request ticket and send it to our product team for review.`,vr:`ADMIN PANEL STEPS:
1. Ask the customer to describe the feature they want in detail
2. Ask how this feature would help them (this context helps the product team)
3. Go to the Create Ticket tab
4. Fill in the customer's info
5. In the Issue Summary, write "FEATURE REQUEST:" followed by a clear description of what the customer wants
6. Copy and submit the ticket
7. Tell the customer: "I've submitted your feature request to our product team. They review all submissions and use them to prioritize future updates. Thank you for helping us improve!"

Do NOT send the customer to Settings > Feedback. We collect feature requests through support tickets.`,es:`Always create a support ticket for feature requests. Include the customer's description of the feature and why they want it.`,fu:`1. Can you describe the feature you would like to see?
2. How would this help your team or league?`,at:`Always create a support ticket with the feature request details. Do NOT direct customers to Settings > Feedback. We want to capture all feature requests through our ticketing system so the product team can track and prioritize them.`},

  {id:60,c:"General How-To Questions",h:"LIVE",p:"Low",sc:"/contact-td-mtt",

  {id:61,c:"Registration / Account Creation",h:"LIVE",p:"Low",sc:"/registration-mtt",
    q:`How do I register for a team event on Match Tennis Team? (Detailed steps)`,cr:`Here is how to register:

If you do NOT have an account yet:
1. Go to MatchTennisTeam.com and click Registration in the menu
2. Select your USTA Section and locate the tournament in the list
3. On the tournament information page, scroll to the Registration section and click Register
4. Complete the registration form and submit
5. Download the Match Tennis TEAM app and login with the credentials you created

If you ALREADY have a username/password:
1. Open the App and tap the menu toggle (top left corner)
2. Select Registrations from the menu
3. Use the Organization filter at the top to find your section
4. Locate the tournament you want and tap Register
5. Fill out the form on the registration page and submit

IMPORTANT: Please make sure you download the Match Tennis TEAM app, not the Match Tennis App. We have two separate apps: one for individual events and one for team events.

You can also find registration links at: https://matchtennisteam.com/#tourn_registration_links`,vr:`ADMIN PANEL STEPS (if needed):
1. This is primarily a how-to question answerable from the scripted response
2. If the customer is having trouble, ask for their email
3. Go to Admin Panel > Account Search to verify their account exists
4. Troubleshoot from there based on what you find

The scripted response should handle most cases. Admin panel is backup.`,es:`If registration errors occur, create a support ticket with event details.`,fu:`1. What is the date and state of your event?
2. Do you already have a Match Tennis Team account?`,at:`Many parents download the wrong app. Always emphasize Match Tennis TEAM, not Match Tennis App. The two are separate. If they cannot find their event on the registration page, ask for date and state so you can provide the direct link.`},
  {id:62,c:"Captain / Admin / Permissions",h:"LIVE",p:"Low",sc:"/captain-privileges",
    q:`How do I grant co captain privileges to another player on my team?`,cr:`You can grant a player co captain privileges by following these steps:

1. Log in to Match Tennis Team
2. Click on the "Team" button on the top menu (or from your app menu select "Teams")
3. Find the player profile card you want to grant co captain privileges
4. Click the "C" button under their name
5. When the prompt pops up, confirm to grant co captain privileges

You can do this for as many players as needed. Any player you grant co captain privileges will be able to create and submit lineups and use mass communications for the team.`,vr:`ADMIN PANEL STEPS:
1. Ask customer for their email and team name
2. Go to Admin Panel > Account Search (MTT tab)
3. Search by email to find their account
4. Check their team membership and role

If changes are needed (captain change, roster edits, deadline extensions), create a support ticket. You cannot make these changes from the admin panel.`,es:`N/A, self service for captains.`,fu:``,at:`Only the current team captain can grant co captain privileges. Co captains can submit lineups and send team messages.`},

  {id:65,c:"Scoring / Reporting Match Results",h:"LIVE",p:"Low",sc:"/team-score-report",
    q:`How do captains or players report team match scores?`,cr:`Here is how to report scores for team matches:

1. Tap the Matches icon in the top menu
2. Tap the "Match Card" icon of the respective match
3. Tap on the text box of the respective match with the text "Report Score"
4. The Score Form window will appear
5. Enter "win, loss, delay" from the dropdown for the respective team player
6. Enter each set score for each team (next set fields will appear after entering the previous set)
7. Tap the "Update" button

Demo Video: https://www.matchtennisteam.com/baseapp/help/video.php?fname=scorereporting.mp4

We encourage the players to do this so the score is fresh in their minds, but captains can also do it for them. The score is entered automatically for both teams based on the first team that enters the score. If there is a discrepancy, notify the tournament director and they will resolve it.`,vr:`ADMIN PANEL STEPS:
1. Ask for tournament name, match details, player names
2. Go to Admin Panel > Account Search to verify the customer's account
3. You CANNOT edit scores from the admin panel
4. Create a support ticket for score corrections

Always create a ticket for score issues. Include: tournament, match date, both player names, incorrect score, correct score.`,es:`If score reporting form has technical issues, create a support ticket.`,fu:`Are you reporting as a captain or a player?`,at:`Either players or captains can report scores. The first team to enter the score fills it in for both sides automatically. Disputes go to the tournament director.`},

If the scripted response resolves it, no admin panel needed. Use admin panel only if they still can't get in.`,es:`If they cannot log in after confirming correct credentials, create a support ticket.`,fu:`1. Have you registered for the team event already?

  {id:70,c:"Registration / Account Creation",h:"LIVE",p:"Low",sc:"/mta-usta-not-found",
    q:`I am trying to register but it says my USTA number is not found.`,cr:`That usually means there is a mismatch between the number you entered and what is in the USTA database. Please double check the number and try again. Common causes include: a typo, an expired USTA membership, or a name mismatch. If it still does not work, I can connect you with a specialist to look it up.`,vr:`ADMIN PANEL STEPS:
1. Ask customer for their USTA number and full name
2. Go to Admin Panel > Account Search
3. Search by USTA number to see if it exists in our system
4. If not found: Search by name to check for alternate entries
5. Verify the USTA number format is correct (should be 8 digits)

If the USTA number is valid but not in our system, create a support ticket to have the player manually added. Collect: player name, USTA number, city, state, date of birth, age division.`,es:`If USTA number cannot be verified or resolved, Create support ticket. Collect: Name, Email, Player's name, City, State, USTA number, Issue summary.`,fu:`1. What USTA number are you entering?
2. Is this a new USTA membership or one you have had for a while?
3. Have you recently renewed your USTA membership?`,at:`VA Agent provides common causes and self-service steps. If unresolved, Live Agent looks up in admin panel and USTA database.`},
  {id:100,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-import-flights",
    q:`How do I import flights, create draws, and publish matches?`,cr:`Here is how to import flights, create draws, and publish matches:

Step 1: Import Flights from TennisLink
1. Click Tournament in the top menu
2. On your tournament row, click Flights
3. Click Import TennisLink Flights in the top right
4. Wait 10-20 seconds for flights to appear
5. Check the box for all flights you want to import
6. Open the dropdown, choose Import (Only) Flights or Import (Finalize) Flights, then click Go
7. Wait about 20 seconds, then click the Back arrow button

Step 2: Create and Finalize Draws
1. On the flights list, click Create Draw for a flight
2. Review the draws to make sure players and seeding look correct
3. Click Step 2 in the upper left
4. Click Finalize Matches

Step 3: Publish Matches
1. Click Tournament in the top menu
2. On your tournament row, click Schedules
3. Click Select All near the top of the page
4. From the Select List Actions dropdown, choose Publish Matches, then click Go

Done. Your matches are now live for players to view.`,vr:`This is a how-to guide for tournament directors. No admin panel action needed unless the director is having technical issues.

If flights are not importing:
1. Verify the tournament exists in TennisLink with divisions and flights
2. Verify the user has League Admin access to TennisLink
3. If still failing, create a support ticket with tournament ID and error details.`,es:`If import fails after multiple attempts, Create support ticket. Collect: Tournament ID, flight details, error message if any.`,fu:`1. What tournament are you working with?
2. Are flights showing in TennisLink?
3. What happens when you click Import?`,at:`Estimated time: about 1-2 minutes. Import (Only) requires manual finalization per flight. Import (Finalize) moves directly to schedules view in draft mode.`},
  {id:101,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-add-tournament",
    q:`How do I add a new tournament to the system?`,cr:`There are three ways to add a tournament:

Option 1: Add New from TennisLink
Best for USTA Adult district, regional, sectional, or national events using the TennisLink Championship Module.
1. Click the Add New from TennisLink button
2. Click View Detail
3. Review the details and click Next
4. Enter basic dates and entry fees
5. Click Create Tournament

Option 2: Add New using Clone Form
Best if you plan to add the tournament to TennisLink later and used this system last year.
1. Click the Add New using Clone Form button
2. Enter the tournament name in this format: YYYY Tournament Name
3. Select the previous year's tournament to clone
4. Click Submit

Option 3: Add New using Blank Form
Best if there is no previous tournament to clone and it is not in TennisLink.
1. Click the Add New using Blank Form button
2. Fill in all tournament details on the detail form
3. Click Update at the bottom`,vr:`This is a how-to guide for tournament directors. No admin panel action needed.

If the director cannot find their tournament in TennisLink:
1. Verify they have League Admin access
2. Verify the tournament exists in TennisLink with divisions and at least one flight per division
3. If still not showing, create a support ticket.`,es:`N/A, general information for tournament directors.`,fu:`1. What type of tournament are you setting up?
2. Is it already in TennisLink?
3. Did you run this tournament last year?`,at:`Option 1 requires League Admin access to TennisLink and the tournament must exist with divisions and at least one flight per division.`},
  {id:102,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-import-tlink-flights",
    q:`How do I import TennisLink flights and finalize matches?`,cr:`Here is how to import TennisLink flights:

Step 1: Import Flights
1. Check the boxes for the flights you want to import
2. Open the Select List Actions dropdown and choose Import (Only) Matches or Import (Finalize) Matches
3. Click Go
4. Wait 10-20 seconds for TennisLink to import

Step 2: Finalize
1. Click the Back arrow button to return to the flights list
2. For each flight, click Create Draw
3. Review match dates, times, and sites
4. Click Step 2
5. Click Finalize Matches

Do this for each flight. Finalized matches will appear in the Schedules view.`,vr:`This is a how-to guide. No admin panel action needed unless the import is failing technically.`,es:`If import continues to fail, Create support ticket. Collect: Tournament ID, flight names, error details.`,fu:`1. Which flights are you trying to import?
2. Do you see an error message?`,at:`Import (Only) requires you to view each flight and finalize to move it to the schedules view. Import (Finalize) imports and finalizes, moving directly to schedules view in draft mode.`},
  {id:103,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-partial-refund",
    q:`How do I issue a partial refund for a tournament payment?`,cr:`Here is how to issue a partial refund:

Step 1: Find the payment
1. Click Payments in the left menu
2. Select a date range of 1 or 3 months, then click Go
3. Use the text filter to search by last name or team name
4. Click the arrow on the desired row to open payment details

Step 2: Issue a partial refund
1. Scroll to the bottom and click Partial Refund
2. Enter the dollar amount to refund
3. Click Submit

Check the payment details to confirm the refund amount before submitting.`,vr:`ADMIN PANEL STEPS:
1. This is a tournament director self-service action
2. If the director cannot find the payment, help them locate it
3. We do NOT process refunds ourselves — the tournament director must do it

If the director needs us to process a refund, create a support ticket.`,es:`Create support ticket for refund issues. Collect: Tournament name, player name, payment amount, reason for refund.`,fu:`1. What tournament is the payment for?
2. What is the player's name?
3. What amount do you need to refund?`,at:`Only tournament directors can process refunds. We do not have direct access to process refunds.`},
  {id:104,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-full-refund",
    q:`How do I issue a full registration refund?`,cr:`Here is how to issue a full registration refund:

1. Click Tournaments in the top menu
2. On the respective tournament, click Teams
3. On the respective team, click Members
4. Click the name of the player you want to refund
5. Scroll to the bottom to view the registration order
6. Click the Refund button

Refunding will return the full registration amount to the player.`,vr:`This is a tournament director self-service action. We do NOT process refunds ourselves.

If the director is having trouble:
1. Walk them through the steps above
2. If the Refund button is not showing, create a support ticket`,es:`Create support ticket for refund issues. Collect: Tournament name, player name, team name.`,fu:`1. What tournament?
2. What player needs the refund?`,at:`Only tournament directors can process refunds through their admin panel.`},
  {id:105,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-remove-team",
    q:`How do I remove a team from a tournament?`,cr:`Here is how to remove a team from a tournament:

1. Click Tournaments in the top menu
2. Click Teams on the respective tournament
3. Check the box to the left of the team name you want to remove
4. In the Bulk List Actions dropdown, choose Remove from Tournament
5. Click Go

The selected team will be removed from the tournament immediately after confirming the action.`,vr:`This is a tournament director self-service action. No admin panel action needed.`,es:`N/A, self-service for tournament directors.`,fu:`1. What tournament?
2. What team needs to be removed?
3. Has the team already played any matches?`,at:`Removing a team is immediate. Make sure no active matches exist for the team before removing.`},
  {id:106,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-remove-player",
    q:`How do I remove a player from a team?`,cr:`Here is how to remove a player from a team:

1. Click Tournaments in the top menu
2. On the respective tournament, click Teams
3. On the respective team, click Members
4. Click the red trash can icon next to the player's name
5. You will be prompted to choose between switching or removing
6. Click Remove User from Team

Once confirmed, the player will no longer be listed as part of the team.`,vr:`This is a tournament director self-service action. No admin panel action needed.`,es:`N/A, self-service for tournament directors.`,fu:`1. What tournament and team?
2. What player needs to be removed?`,at:`The trash can icon gives two options: switch to another team or remove entirely.`},
  {id:107,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-switch-player",
    q:`How do I switch a player to another team?`,cr:`Here is how to switch a player to another team:

1. Click Tournaments in the top menu
2. On the respective tournament, click Teams
3. On the respective team, click Members
4. Click the red trash can icon next to the player's name
5. Choose the tournament and team to switch the player to
6. Click Switch Team

The player will be removed from the original team and added to the new team you selected.`,vr:`This is a tournament director self-service action. No admin panel action needed.`,es:`N/A, self-service for tournament directors.`,fu:`1. What tournament?
2. What team is the player currently on?
3. What team should they be moved to?`,at:`The trash can icon gives the option to switch teams. The player is removed from the original and added to the new team.`},
  {id:108,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-match-day",
    q:`What are the match day procedures for tournament directors?`,cr:`Here is the match day overview:

1. View and Filter Schedules — Click Tournament > Schedules, set Date and Time filters
2. Monitor Lineup Submissions — Watch the Status column (Pending, Half circle, Review)
3. Review and Approve Lineups — Click the blue match card button, review, click Approve or Reject Review
4. Assign Courts — Click Tournament > Desk, choose site, drag and drop match cards onto courts
5. Players receive court assignment notifications automatically
6. Scores are reported by players and move to the Scores column

For denied lineups, click the SMS icon to notify the captain to resubmit.`,vr:`This is a how-to guide for tournament directors. No admin panel action needed.

If there are technical issues with the virtual tournament desk or lineup approvals, create a support ticket with tournament ID and match details.`,es:`Create support ticket for technical match day issues. Collect: Tournament ID, match details, error description.`,fu:`1. What tournament?
2. What specific match day issue are you experiencing?`,at:`The virtual tournament desk is accessed from Tournament > Desk or from Schedules > Virtual Tournament Desk. Both go to the same view.`},
  {id:109,c:"Team Tournament Admin",h:"LIVE",p:"Low",sc:"/mtt-rain-delay",
    q:`What are the rain delay procedures?`,cr:`Here are the rain delay procedures:

Step 1: Turn off automations
1. Click Tournament > Detail
2. Click Edit and set Match Card Reminders and Auto Approve to Off
3. Send a message to players with the delay and next update time

Step 2: Reschedule options

function AdminPanel({session}){
  const[ap,setAp]=useState("MTA");
  const[q,setQ]=useState("");
  const[allResults,setAllResults]=useState(null);
  const[r,setR]=useState(null);
  const[selAcct,setSelAcct]=useState(null);
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null);
  const[tq,setTq]=useState("");
  const[tr,setTr]=useState(null);
  const[eq,setEq]=useState("");
  const[er,setEr]=useState(null);
  const[confirmAction,setConfirmAction]=useState(null);
  const[phEdit,setPhEdit]=useState({});
  const[phSaving,setPhSaving]=useState(null);
  const[plQ,setPlQ]=useState("");
  const[plR,setPlR]=useState(null);
  const[plLoading,setPlLoading]=useState(false);
  const[plEdit,setPlEdit]=useState({});
  const[plSaving,setPlSaving]=useState(null);
  const[plDivAdd,setPlDivAdd]=useState({});
  const[plDivSaving,setPlDivSaving]=useState(null);
  // UX-only state. Selection and "show all" are never an authorization boundary.
  // All players in r.players are already authorized server-side.
  const[selectedUsta,setSelectedUsta]=useState(null);
  const[showAllPlayers,setShowAllPlayers]=useState(false);
  const[playerFilter,setPlayerFilter]=useState("");
  const detailRef=useRef(null);

  const normalizeDivision=(d)=>{
    if(!d)return "";
    const raw=String(d).trim();
    if(!raw)return "";
    // Long form (apostrophe optional, case-insensitive): "Boys' 18 Singles", "boys 18 singles", "Boys 18s"
    let lm=raw.match(/^(boys|girls|mens|womens)'?\s*(\d+|open)\s*(?:singles|s)?$/i);
    if(lm){
      const g=lm[1].toLowerCase();
      const age=lm[2].toLowerCase();
      const prefix=g==="boys"?"Boys'":g==="girls"?"Girls'":g==="mens"?"Mens'":"Womens'";
      if(age==="open")return prefix+" Open Singles";
      return prefix+" "+age+" Singles";
    }
    // Short form: "B18s", "B-18", "BS18", "G14", "MO", "WOs", etc.
    let sm=raw.match(/^([bgmw])s?[-\s]?(\d+|o(?:pen)?)s?$/i);
    if(sm){
      const g=sm[1].toLowerCase();
      const age=sm[2].toLowerCase();
      const prefix=g==="b"?"Boys'":g==="g"?"Girls'":g==="m"?"Mens'":"Womens'";
      if(age==="o"||age==="open")return prefix+" Open Singles";
      return prefix+" "+age+" Singles";
    }
    return raw;
  };

  const sanitizeForPrompt=(s)=>String(s||"").replace(/[\r\n\t\x00-\x1f\x7f]/g,"").slice(0,120);

  const authHeaders=()=>{
    const h={};
    if(session?.access_token)h["Authorization"]="Bearer "+session.access_token;
    return h;
  };

  const saveTournPhone=async(tournId)=>{
    const next=(phEdit[tournId]??"").trim();
    setPhSaving(tournId);
    try{
      const res=await fetch("/api/mta/update-tournament-phone",{method:"POST",
        headers:{"Content-Type":"application/json","X-Requested-With":"XMLHttpRequest",...authHeaders()},
        body:JSON.stringify({tournId,phone:next})});
      if(res.status===401){setMsg({t:"e",m:"Session expired — please refresh."});return;}
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"save failed");
      setR(prev=>prev?{...prev,
        upcoming:(prev.upcoming||[]).map(w=>w.tournId===tournId?{...w,directorPhone:j.phone}:w),
        waivers:(prev.waivers||[]).map(w=>w.tournId===tournId?{...w,directorPhone:j.phone}:w)
      }:prev);
      setPhEdit(prev=>{const n={...prev};delete n[tournId];return n});
      setMsg({t:"s",m:"Director phone updated."});
    }catch(e){
      setMsg({t:"e",m:"Failed to update phone: "+(e.message||"unknown error")});
    }finally{
      setPhSaving(null);
    }
  };

  const doSearch=async(qStr)=>{
    const term=(typeof qStr==="string"?qStr:q).trim();
    if(!term)return;
    if(typeof qStr==="string")setQ(term);
    setLoading(true);setMsg(null);setR(null);setAllResults(null);setSelAcct(null);setMttTeams(null);setConfirmAction(null);setPlR(null);setSelectedUsta(null);setShowAllPlayers(false);setPlayerFilter("");
    try{
      const path=ap==="MTA"?"/api/mta/search":"/api/mtt/search";
      const res=await fetch(path+"?q="+encodeURIComponent(term),{headers:authHeaders()});
      if(res.status===401){setMsg({t:"e",m:"Session expired — please refresh to re-authenticate."});return;}
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"request failed");
      if(!j.data||j.data.length===0){setMsg({t:"i",m:"No results found."});}
      else if(j.data.length===1){setR(j.data[0]);setAllResults(null);if(ap==="MTT"&&j.data[0].id)loadMttTeams(j.data[0].id);}
      else{
        const qNorm=term.toLowerCase();
        const exact=j.data.find(a=>a.name&&a.name.toLowerCase()===qNorm)||j.data.find(a=>a.email&&a.email.toLowerCase()===qNorm);
        if(exact){setR(exact);setAllResults(j.data.filter(a=>a.id!==exact.id));setMsg(j.data.length>1?{t:"i",m:(j.data.length-1)+" other account(s) found."}:null);if(ap==="MTT"&&exact.id)loadMttTeams(exact.id);}
        else{setAllResults(j.data);setMsg({t:"i",m:j.data.length+" results found — select an account."});}
      }
    }catch(err){
      if(err instanceof TypeError&&err.message.includes("fetch")){setMsg({t:"e",m:"Network error — check your connection and retry."});}
      else{setMsg({t:"e",m:"Error: "+(err.message||err)});}
    }
    finally{setLoading(false);}
  };

  const doPlayerSearch=async()=>{
    if(!plQ.trim())return;
    setPlLoading(true);setMsg(null);setPlR(null);setR(null);setAllResults(null);setSelAcct(null);setMttTeams(null);setConfirmAction(null);setPlEdit({});setPlDivAdd({});setSelectedUsta(null);setShowAllPlayers(false);setPlayerFilter("");
    try{
      const res=await fetch("/api/mta/player-search?q="+encodeURIComponent(plQ.trim()),{headers:authHeaders()});
      if(res.status===401){setMsg({t:"e",m:"Session expired — please refresh to re-authenticate."});return;}
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"request failed");
      if(!j.data||j.data.length===0){setMsg({t:"i",m:"No players found."});setPlR([]);}
      else{setPlR(j.data);setMsg({t:"i",m:j.data.length+" player"+(j.data.length===1?"":"s")+" found."});}
    }catch(err){
      if(err instanceof TypeError&&err.message.includes("fetch")){setMsg({t:"e",m:"Network error — check your connection and retry."});}
      else{setMsg({t:"e",m:"Error: "+(err.message||err)});}
    }
    finally{setPlLoading(false);}
  };

  const playerField=(pl,key)=>{
    const buf=plEdit[pl.ustaNo];
    if(buf && key in buf)return buf[key];
    return pl[key]??"";
  };
  const setPlayerField=(ustaNo,key,value)=>{
    setPlEdit(prev=>({...prev,[ustaNo]:{...(prev[ustaNo]||{}),[key]:value}}));
  };
  const playerDirty=(pl)=>{
    const buf=plEdit[pl.ustaNo];
    if(!buf)return false;
    return Object.keys(buf).some(k=>String(buf[k]??"")!==String(pl[k]??""));
  };
  const savePlayer=async(pl)=>{
    const buf=plEdit[pl.ustaNo]||{};
    const payload={ustaNo:pl.ustaNo};
    if("utrSingles" in buf)payload.utr=buf.utrSingles===""?null:Number(buf.utrSingles);
    if("wtnSingles" in buf)payload.wtn=buf.wtnSingles===""?null:Number(buf.wtnSingles);
    if("gradYear" in buf)payload.gradYear=buf.gradYear===""?null:Number(buf.gradYear);
    if("section" in buf)payload.section=buf.section;
    if("district" in buf)payload.district=buf.district;
    if("city" in buf)payload.city=buf.city;
    if("state" in buf)payload.state=buf.state;
    setPlSaving(pl.ustaNo);
    try{
      const res=await fetch("/api/mta/update-player",{method:"POST",
        headers:{"Content-Type":"application/json","X-Requested-With":"XMLHttpRequest",...authHeaders()},
        body:JSON.stringify(payload)});
      if(res.status===401){setMsg({t:"e",m:"Session expired — please refresh."});return;}
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"save failed");
      setPlR(prev=>(prev||[]).map(p=>p.ustaNo===pl.ustaNo?{...p,...j.updated}:p));
      setPlEdit(prev=>{const n={...prev};delete n[pl.ustaNo];return n});
      setMsg({t:"s",m:"Player updated."});
    }catch(e){
      setMsg({t:"e",m:"Failed to update player: "+(e.message||"unknown error")});
    }finally{
      setPlSaving(null);
    }
  };
  const addPlayerDivision=async(pl)=>{
    const ageGroup=(plDivAdd[pl.ustaNo]||"").trim();
    if(!ageGroup){setMsg({t:"w",m:"Enter a division (e.g. B16s, G14s)."});return;}
    setPlDivSaving(pl.ustaNo);
    try{
      const res=await fetch("/api/mta/create-player",{method:"POST",
        headers:{"Content-Type":"application/json","X-Requested-With":"XMLHttpRequest",...authHeaders()},
        body:JSON.stringify({ustaNo:pl.ustaNo,ageGroup})});
      if(res.status===401){setMsg({t:"e",m:"Session expired — please refresh."});return;}
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"add failed");
      setPlR(prev=>(prev||[]).map(p=>p.ustaNo===pl.ustaNo
        ? {...p,divisions:p.divisions.includes(ageGroup)?p.divisions:[...p.divisions,ageGroup].sort()}
        : p));
      setPlDivAdd(prev=>{const n={...prev};delete n[pl.ustaNo];return n});
      setMsg({t:"s",m:j.message||"Division added."});
    }catch(e){
      setMsg({t:"e",m:"Failed to add division: "+(e.message||"unknown error")});
    }finally{
      setPlDivSaving(null);
    }
  };

  const selectResult=(acct)=>{
    setR(acct);setAllResults(null);setMsg(null);setConfirmAction(null);
    setSelectedUsta(null);setShowAllPlayers(false);setPlayerFilter("");
    if(ap==="MTT"&&acct.id)loadMttTeams(acct.id);
  };

  const loadAccount=async(id)=>{
    setSelAcct(null);setMsg(null);
    try{
      const res=await fetch("/api/mta/account?id="+id,{headers:authHeaders()});
      const j=await res.json();
      if(j.ok)setSelAcct(j.data);
      else setMsg({t:"e",m:"Could not load account"});
    }catch(err){setMsg({t:"e",m:"Error: "+(err.message||err)});}
  };

  const doAction=(label)=>{
    setMsg({t:"w",m:label+" requires write access. Contact admin to run this action."});
  };

  const[mttActionLoading,setMttActionLoading]=useState(null);
  const[mttShirtEdit,setMttShirtEdit]=useState(null);
  const[mttTeams,setMttTeams]=useState(null);
  const[mttTeamsLoading,setMttTeamsLoading]=useState(false);

  const[mttTeamsError,setMttTeamsError]=useState(null);
  const loadMttTeams=async(usrId)=>{
    setMttTeamsLoading(true);setMttTeams(null);setMttTeamsError(null);
    try{
      const res=await fetch("/api/mtt/teams?usr_id="+usrId,{headers:authHeaders()});
      if(res.status===401){setMsg({t:"e",m:"Session expired — please refresh to re-authenticate."});return;}
      const j=await res.json();
      if(j.ok)setMttTeams(j);
      else setMttTeamsError("Could not load teams.");
    }catch(e){
      if(e instanceof TypeError&&String(e.message).includes("fetch")){setMttTeamsError("Network error — check connection.");}
      else{setMttTeamsError("Could not load teams.");}
    }
    finally{setMttTeamsLoading(false);}
  };

  // Confirmation for destructive actions — first click sets confirmAction, second click executes
  const handleMttAction=(action,usrId,extra)=>{
    if((action==="reset-password"||action==="unlock")&&confirmAction!==action){
      setConfirmAction(action);
      setTimeout(()=>setConfirmAction(c=>c===action?null:c),5000);
      return;
    }
    setConfirmAction(null);
    doMttAction(action,usrId,extra);
  };

  const doMttAction=async(action,usrId,extra)=>{
    setMsg(null);setMttActionLoading(action);
    const endpoints={"reset-password":"/api/mtt/actions/reset-password","unlock":"/api/mtt/actions/unlock","sync-ntrp":"/api/mtt/actions/sync-ntrp","sync-wtn":"/api/mtt/actions/sync-wtn","update-shirt":"/api/mtt/actions/update-shirt","update-role":"/api/mtt/actions/update-role"};
    try{
      const res=await fetch(endpoints[action],{method:"POST",headers:{"Content-Type":"application/json","X-Requested-With":"XMLHttpRequest",...authHeaders()},body:JSON.stringify({usr_id:usrId,...(extra||{})})});
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"Action failed");
      const showSuccess=(m)=>{setMsg({t:"s",m});setTimeout(()=>setMsg(prev=>prev?.t==="s"?null:prev),4000);};
      if(action==="reset-password"){
        showSuccess("Password reset link sent to customer's email. Ask them to check inbox and spam.");
      }else if(action==="unlock"){
        showSuccess("Account unlocked. Failed logins cleared.");doSearch();
      }else if(action==="sync-ntrp"){
        showSuccess("NTRP sync complete."+(j.rating?" Rating: "+j.rating:""));
      }else if(action==="sync-wtn"){
        showSuccess("WTN sync triggered."+(j.rating?" Rating: "+j.rating:""));doSearch();
      }else if(action==="update-shirt"){
        showSuccess("T-shirt size updated.");setMttShirtEdit(null);doSearch();
      }else if(action==="update-role"){
        const labels={"captain":"Captain","co-captain":"Co-Captain","athlete":"Player"};
        showSuccess("Role updated to "+(labels[extra?.role]||extra?.role)+".");loadMttTeams(usrId);
      }
    }catch(err){setMsg({t:"e",m:"Error: "+(err.message||err)});}
    finally{setMttActionLoading(null);}
  };

  const doTSearch=async()=>{
    if(!tq.trim())return;
    setTr(null);setMsg(null);
    try{
      const res=await fetch("/api/mta/tournaments?q="+encodeURIComponent(tq.trim()),{headers:authHeaders()});
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"request failed");
      if(!j.data||j.data.length===0){setMsg({t:"i",m:"No tournaments found."});}
      else{setTr(j.data[0]);if(j.data.length>1)setMsg({t:"i",m:j.data.length+" matches \u2014 showing top result."});}
    }catch(err){setMsg({t:"e",m:"Error: "+(err.message||err)});}
  };

  const doESearch=async()=>{
    if(!eq.trim())return;
    setEr(null);setMsg(null);
    try{
      const res=await fetch("/api/mtt/events?q="+encodeURIComponent(eq.trim()),{headers:authHeaders()});
      const j=await res.json();
      if(!j.ok)throw new Error(j.error||"request failed");
      if(!j.data||j.data.length===0){setMsg({t:"i",m:"No events found."});setEr([]);}
      else{setEr(j.data);}
    }catch(err){setMsg({t:"e",m:"Error: "+(err.message||err)});}
  };

  const msgBg={s:"var(--green-light)",e:"var(--rose-light)",i:"var(--blue-light)",w:"var(--amber-light)"};
  const msgC={s:"var(--green-dark)",e:"var(--rose)",i:"var(--blue)",w:"var(--amber)"};
  const msgBd={s:"#86EFAC",e:"#FECDD3",i:"#93C5FD",w:"#FDE68A"};

  // Derived: effectiveSelectedUsta self-heals when r.players changes (new account,
  // MTA/MTT switch, search filter hides current). Falls back to first player.
  const ustaList=r&&r.players?[...new Set(r.players.map(p=>p.usta).filter(Boolean))]:[];
  const effectiveSelectedUsta=(selectedUsta&&ustaList.includes(selectedUsta))?selectedUsta:(ustaList[0]||null);

  const handlePlayerKeyDown=(e,usta)=>{
    const idx=ustaList.indexOf(usta);
    if(idx<0)return;
    if(e.key==="Enter"||e.key===" "){e.preventDefault();setSelectedUsta(usta);return;}
    if(e.key==="ArrowDown"||e.key==="ArrowRight"){
      e.preventDefault();
      const next=ustaList[(idx+1)%ustaList.length];
      setSelectedUsta(next);
      requestAnimationFrame(()=>document.getElementById("plr-"+next)?.focus());
    }else if(e.key==="ArrowUp"||e.key==="ArrowLeft"){
      e.preventDefault();
      const prev=ustaList[(idx-1+ustaList.length)%ustaList.length];
      setSelectedUsta(prev);
      requestAnimationFrame(()=>document.getElementById("plr-"+prev)?.focus());
    }else if(e.key==="Home"){
      e.preventDefault();setSelectedUsta(ustaList[0]);
      requestAnimationFrame(()=>document.getElementById("plr-"+ustaList[0])?.focus());
    }else if(e.key==="End"){
      e.preventDefault();const last=ustaList[ustaList.length-1];setSelectedUsta(last);
      requestAnimationFrame(()=>document.getElementById("plr-"+last)?.focus());
    }
  };

  useEffect(()=>{
    if(!effectiveSelectedUsta||!detailRef.current)return;
    const rect=detailRef.current.getBoundingClientRect();
    const outOfView=rect.top<0||rect.top>window.innerHeight*0.8;
    if(outOfView)detailRef.current.scrollIntoView({behavior:"smooth",block:"start"});
  },[effectiveSelectedUsta]);

  useEffect(()=>{
    if(!r?.players)return;
    const f=playerFilter.toLowerCase();
    if(!f)return;
    const visible=ustaList.filter(u=>{
      const pp=r.players.filter(p=>p.usta===u);
      const pn=pp[0];
      const blob=((pn?.name||"")+" "+u).toLowerCase();
      return blob.includes(f);
    });
    if(effectiveSelectedUsta&&!visible.includes(effectiveSelectedUsta)&&visible.length>0){
      setSelectedUsta(visible[0]);
    }
  },[playerFilter,r?.players]);

  useEffect(()=>{
    if(typeof window!=="undefined"&&window.__MTA_DEBUG)console.debug("[mta] selected",effectiveSelectedUsta);
  },[effectiveSelectedUsta]);

  return (
    <div style={{maxWidth:960,margin:"0 auto",padding:"16px 24px"}}>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <div style={{display:"flex",background:"var(--card)",borderRadius:10,padding:3,border:"1px solid var(--border)"}}>
          {["MTA","MTT"].map(p=>(
            <button key={p} onClick={()=>{setAp(p);setR(null);setAllResults(null);setTr(null);setEr(null);setMsg(null);setMttTeams(null);setConfirmAction(null);setPlR(null);setPlQ("");setSelectedUsta(null);setShowAllPlayers(false);setPlayerFilter("")}}
              style={{padding:"8px 20px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",
                background:ap===p?"var(--green)":"transparent",color:ap===p?"#fff":"var(--text3)"}}>
              {p==="MTA"?"🎾 Match Tennis App":"👥 Match Tennis Team"}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:12}}>
        <div>
          <div style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",boxShadow:"var(--shadow)",overflow:"hidden"}}>
            <div style={{background:"var(--green-dark)",padding:"10px 16px",color:"#fff"}}>
              <div style={{fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif"}}>🔍 Account Search</div>
              <div style={{fontSize:10,opacity:.7}}>Search by email, name, or USTA number</div>
            </div>
            <div style={{padding:16}}>
              <div style={{display:"flex",gap:6}}>
                <input type="text" placeholder={ap==="MTA"?"Email, name, or USTA#...":"Email, name, or team..."} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()}
                  style={{flex:1,padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}} />
                <button onClick={doSearch} style={{padding:"10px 18px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,background:"var(--green)",color:"#fff",fontFamily:"'Outfit',sans-serif"}}>

                </button>

              {msg && <div style={{marginTop:10,padding:"8px 12px",borderRadius:8,fontSize:12,background:msgBg[msg.t],color:msgC[msg.t],border:"1px solid "+msgBd[msg.t]}}>{msg.m}</div>}

              {!r && !allResults && !loading && !msg && (

                      <span style={{padding:"2px 8px",borderRadius:10,fontSize:9,fontWeight:600,

                      {acct.attempts>0 && <span style={{fontSize:9,color:"var(--rose)",fontWeight:700}}>{acct.attempts} failed</span>}

                            <div style={{fontSize:11,opacity:.7,display:"flex",alignItems:"center",gap:6}}>
                              {r.email}
                              <button onClick={(e)=>{e.stopPropagation();try{navigator.clipboard.writeText(r.email);setMsg({t:"s",m:"Email copied!"})}catch{setMsg({t:"w",m:"Copy failed — select and Ctrl+C: "+r.email})}}}

                                Copy

                            </div>
                            <div style={{fontSize:10,opacity:.7,marginTop:2,display:"flex",alignItems:"center",gap:6}}>

                                Copy
                              </button>}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                            {r.role && r.role!=="Player" && <span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,background:"rgba(109,40,217,.25)",color:"#C4B5FD"}}>{r.role}</span>}
                            <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",padding:"3px 10px",background:"rgba(255,255,255,.15)",borderRadius:4,color:"#fff"}}>ID: {r.id}</span>
                            <span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,
                              background:r.status==="active"?"rgba(134,239,172,.25)":"rgba(253,230,138,.25)",
                              color:r.status==="active"?"#86EFAC":"#FDE68A"}}>{r.status}</span>
                          </div>
                        </div>
                      </div>

                      <div style={{display:"flex",borderBottom:"1px solid var(--border)",fontSize:11}}>
                        <div style={{flex:1,padding:"8px 14px",borderRight:"1px solid var(--border)",textAlign:"center"}}>
                          <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase"}}>Failed Logins</div>
                          <div style={{fontSize:16,fontWeight:700,fontFamily:"'Outfit',sans-serif",color:r.attempts>0?"var(--rose)":"var(--green-dark)",marginTop:2}}>{r.attempts}</div>
                        </div>
                        <div style={{flex:1,padding:"8px 14px",borderRight:"1px solid var(--border)",textAlign:"center"}}>
                          <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase"}}>Location</div>
                          <div style={{fontSize:11,fontWeight:600,marginTop:2}}>{[r.city,r.state].filter(Boolean).join(", ")||"—"}</div>
                        </div>
                        <div style={{flex:1,padding:"8px 14px",borderRight:"1px solid var(--border)",textAlign:"center"}}>
                          <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase"}}>WTN</div>

                            </div>

                              {(r.players[0]||{}).shirt||"—"}
                            </div>

                        </div>
                      </div>

                      <div style={{padding:"10px 14px",background:"#FAFBFA",borderBottom:"1px solid var(--border)",display:"flex",gap:8,flexWrap:"wrap"}}>

                          title={r.attempts===0?"No failed logins to clear":""}>

                        </button>
                        <button onClick={()=>handleMttAction("sync-ntrp",r.id)} disabled={mttActionLoading==="sync-ntrp"}
                          style={{padding:"7px 14px",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,background:"var(--blue)",color:"#fff",fontFamily:"'Outfit',sans-serif",opacity:mttActionLoading==="sync-ntrp"?.6:1}}>
                          {mttActionLoading==="sync-ntrp"?"Syncing...":"🔄 Sync NTRP"}
                        </button>
                        <button onClick={()=>handleMttAction("sync-wtn",r.id)} disabled={mttActionLoading==="sync-wtn"}
                          style={{padding:"7px 14px",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,background:"var(--purple)",color:"#fff",fontFamily:"'Outfit',sans-serif",opacity:mttActionLoading==="sync-wtn"?.6:1}}>
                          {mttActionLoading==="sync-wtn"?"Syncing...":"🔄 Sync WTN"}
                        </button>
                        <button onClick={()=>{

                          const ticket=["=== SUPPORT TICKET ===","Date: "+new Date().toLocaleString(),"Account Name: "+r.name,"Email: "+r.email,"Account Status: "+r.status,"Location: "+[r.city,r.state].filter(Boolean).join(", "),
                            p.shirt?"T-Shirt: "+p.shirt:"","","Issue: [describe issue here]","=== END TICKET ==="].filter(Boolean).join("\n");
                          navigator.clipboard.writeText(ticket);setMsg({t:"s",m:"Ticket copied! Paste into tawk.to"});
                        }} style={{padding:"7px 14px",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,background:"#475569",color:"#fff",fontFamily:"'Outfit',sans-serif"}}>
                          🎫 Copy Ticket
                        </button>
                      </div>

                      {/* ══════ TEAMS & REGISTRATION ══════ */}
                      {mttTeamsLoading && (
                        <div style={{padding:"12px 14px",fontSize:11,color:"var(--text3)",textAlign:"center"}}>Loading teams...</div>

                      {mttTeamsError && !mttTeamsLoading && (
                        <div style={{padding:"10px 14px",fontSize:11,color:"var(--rose)",display:"flex",alignItems:"center",gap:8}}>
                          <span>{mttTeamsError}</span>
                          <button onClick={()=>loadMttTeams(r.id)} style={{padding:"3px 10px",border:"1px solid var(--rose)",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:600,background:"var(--rose-light)",color:"var(--rose)"}}>Retry</button>
                        </div>
                      )}
                      {mttTeams && (
                        <div style={{borderTop:"1px solid var(--border)"}}>
                          {/* Tournament Teams */}

                              <div style={{fontSize:9,fontWeight:700,color:"var(--green-dark)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Tournament Teams ({mttTeams.tournTeams.length})</div>
                              {mttTeams.tournTeams.map((t,i)=>(
                                <div key={i} style={{padding:"8px 12px",marginBottom:6,background:"var(--bg)",borderRadius:8,border:"1px solid var(--border)"}}>
                                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                    <div>
                                      <div style={{fontSize:12,fontWeight:600}}>{t.team_name||t.tourn_team_name||t.name||"Team"}</div>
                                      <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>
                                        {t.tourn_title||t.tournament_name||t.tourn_name||""}
                                        {t.tourn_state?" · "+t.tourn_state:""}
                                      </div>
                                    </div>

                                        <option value="captain">Captain</option>
                                        <option value="co-captain">Co-Captain</option>

                                          <div style={{marginBottom:8}}>
                                            <div style={{fontSize:9,fontWeight:700,color:"var(--rose)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Waiver Not Completed ({t.notCompleted.length})</div>
                                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
                                              {t.notCompleted.map((a,ai)=>(
                                                <div key={"nc"+ai} data-player={(a.name+" "+a.event+" "+a.usta).toLowerCase()} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 8px",borderRadius:4,background:"rgba(254,205,211,.3)",fontSize:10}}>
                                                  <span style={{width:8,height:8,borderRadius:"50%",background:"var(--rose)",flexShrink:0}}></span>
                                                  <div style={{flex:1,overflow:"hidden"}}>
                                                    <span style={{fontWeight:600,color:"var(--rose)"}}>{a.name}</span>
                                                    <span style={{color:"var(--text3)",marginLeft:4,fontSize:9}}>{a.event}</span>
                                                  </div>
                                                  <span style={{fontSize:8,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)"}}>{a.usta}</span>
                                                </div>
                                              ))}
                                            </div>
                                          </div>
                                        )}
                                        <div style={{fontSize:9,fontWeight:700,color:"var(--green-dark)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Completed ({t.applicants.length})</div>
                                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
                                          {t.applicants.map((a,ai)=>(
                                            <div key={ai} data-player={(a.name+" "+a.event+" "+a.usta).toLowerCase()} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 8px",borderRadius:4,background:"rgba(255,255,255,.5)",fontSize:10}}>
                                              <span style={{width:8,height:8,borderRadius:"50%",background:"var(--green)",flexShrink:0}}></span>
                                              <div style={{flex:1,overflow:"hidden"}}>
                                                <span style={{fontWeight:600,color:"var(--green-dark)"}}>{a.name}</span>
                                                <span style={{color:"var(--text3)",marginLeft:4,fontSize:9}}>{a.event}</span>
                                              </div>
                                              <span style={{fontSize:8,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)"}}>{a.usta}</span>
                                            </div>
                                          ))}
                                        </div>
                                      </div>
                                    </details>
                                  )}
                                </div>
                              ))}
                            </div>
                          )}
                          {r.directedTournaments.filter(t=>!t.upcoming).length>0 && (
                            <div>
                              <div style={{fontSize:9,fontWeight:600,color:"var(--text3)",marginBottom:4}}>Past</div>
                              {r.directedTournaments.filter(t=>!t.upcoming).map((t,i)=>(
                                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 10px",marginBottom:2,fontSize:11}}>
                                  <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)",whiteSpace:"nowrap",minWidth:90}}>{t.dates.split(" — ")[0]||"—"}</div>
                                  <div style={{flex:1,color:"var(--text2)"}}>
                                    {t.name}
                                    {t.id && <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"var(--text3)",marginLeft:4}}>{t.id}</span>}
                                    <span style={{fontSize:10,color:"var(--text3)",marginLeft:4}}>{t.loc}</span>
                                  </div>
                                  {t.ustaLink && <a href={t.ustaLink} target="_blank" rel="noopener noreferrer" style={{fontSize:9,fontWeight:600,color:"var(--green-dark)",textDecoration:"none",whiteSpace:"nowrap"}}>USTA ↗</a>}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}

                  {/* ══════ PLAYER CARDS (MTA) ══════ */}
                  {ap==="MTA" && r.players.length>0 && (
                    <div ref={detailRef}>
                      {ustaList.length===0 && (
                        <div style={{padding:20,textAlign:"center",fontSize:12,color:"var(--text2)",background:"var(--bg)",borderRadius:8,border:"1px dashed var(--border)"}}>
                          No players with USTA numbers on this account.
                        </div>
                      )}
                      {ustaList.length>1 && (
                        <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:8,marginBottom:8}}>
                          <span data-players-counter style={{fontSize:12,color:"var(--text2)",fontWeight:500}}>{showAllPlayers?`Showing all ${ustaList.length}`:`Showing 1 of ${ustaList.length}`}</span>
                          <div role="group" aria-label="Player visibility" style={{display:"inline-flex",border:"1px solid var(--border)",borderRadius:6,overflow:"hidden",fontSize:12}}>
                            <button data-players-toggle aria-pressed={!showAllPlayers} onClick={()=>setShowAllPlayers(false)}
                              style={{padding:"6px 12px",border:"none",background:!showAllPlayers?"var(--green-dark)":"var(--bg)",color:!showAllPlayers?"#fff":"var(--text2)",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>Selected</button>
                            <button data-players-toggle aria-pressed={showAllPlayers} onClick={()=>setShowAllPlayers(true)}
                              style={{padding:"6px 12px",border:"none",borderLeft:"1px solid var(--border)",background:showAllPlayers?"var(--green-dark)":"var(--bg)",color:showAllPlayers?"#fff":"var(--text2)",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>All ({ustaList.length})</button>
                          </div>
                        </div>
                      )}
                      <div className="fade-in" key={showAllPlayers?"all":effectiveSelectedUsta}>
                      {ustaList.filter(usta=>showAllPlayers||usta===effectiveSelectedUsta).map(usta=>{
                        const pp=r.players.filter(p=>p.usta===usta);
                        const p=pp[0];
                        const pUp=(r.upcoming||[]).filter(w=>w.playerUsta===usta);
                        const pWv=(r.waivers||[]).filter(w=>w.playerUsta===usta);

                          <div key={usta} style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",marginBottom:12,overflow:"hidden",boxShadow:"var(--shadow)"}}>

                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <div style={{fontSize:15,fontWeight:700,fontFamily:"'Outfit',sans-serif"}}>{p.name}</div>
                                <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",padding:"3px 10px",background:"rgba(255,255,255,.15)",borderRadius:4,color:"#fff"}}>USTA: {p.usta}</span>
                              </div>
                            </div>
                            <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)"}}>
                              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px 10px",fontSize:11,color:"var(--text2)"}}>
                                <div><span style={{color:"var(--text3)",fontSize:9}}>Section</span><br/><strong>{p.section||"—"}</strong></div>
                                <div><span style={{color:"var(--text3)",fontSize:9}}>District</span><br/><strong>{p.district||"—"}</strong></div>
                                <div><span style={{color:"var(--text3)",fontSize:9}}>UTR</span><br/><strong style={{color:p.utrSingles?"var(--green-dark)":"inherit"}}>{p.utrSingles||"—"}</strong></div>
                                <div><span style={{color:"var(--text3)",fontSize:9}}>WTN</span><br/><strong>{p.wtnSingles||"—"}</strong></div>
                              </div>
                              <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                                {pp.map((d,di)=>(
                                  <span key={di} style={{fontSize:9,padding:"2px 8px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)",color:"var(--text2)"}}>{d.div}</span>
                                ))}
                              </div>
                              <div style={{display:"flex",gap:12,marginTop:6,fontSize:10,color:"var(--text3)"}}>
                                {p.nationalRank>0 && <span>Nat: #{p.nationalRank}</span>}
                                {p.sectionRank>0 && <span>Sec: #{p.sectionRank}</span>}
                                {p.districtRank>0 && <span>Dist: #{p.districtRank}</span>}
                                {p.nationalPts>0 && <span>{p.nationalPts} pts</span>}
                                {(p.city||p.state) && <span>{[p.city,p.state].filter(Boolean).join(", ")}</span>}
                              </div>
                              {ap==="MTA" && <div style={{display:"flex",gap:6,marginTop:8}}>
                                <button disabled style={{padding:"5px 12px",borderRadius:5,fontSize:10,fontWeight:700,border:"1px solid #FDE68A",background:"var(--amber-light)",color:"var(--amber)",cursor:"not-allowed",fontFamily:"'Outfit',sans-serif"}}>🔒 UTR Sync</button>
                                <button disabled style={{padding:"5px 12px",borderRadius:5,fontSize:10,fontWeight:700,border:"1px solid #FDE68A",background:"var(--amber-light)",color:"var(--amber)",cursor:"not-allowed",fontFamily:"'Outfit',sans-serif"}}>🔒 Add Division</button>
                              </div>}
                            </div>

                            {/* Upcoming */}
                            {pUp.length>0 && (
                              <div style={{padding:"8px 14px",background:"var(--green-light)",borderBottom:"1px solid #86EFAC"}}>
                                <div style={{fontSize:9,fontWeight:700,color:"var(--green-dark)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Upcoming ({pUp.length})</div>
                                {pUp.map((w,wi)=>(
                                  <div key={wi} style={{marginBottom:wi<pUp.length-1?4:0}}>
                                    <div onClick={(e)=>{const d=e.currentTarget.nextSibling;if(d)d.style.display=d.style.display==="none"?"block":"none"}} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:wi<pUp.length-1?"1px solid rgba(45,106,79,.15)":"none",cursor:"pointer"}}>
                                      <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--green-dark)",fontWeight:600,whiteSpace:"nowrap",minWidth:100}}>{w.dates.split(" — ")[0]}</div>
                                      <div style={{flex:1}}>
                                        <div style={{fontSize:11,fontWeight:600,color:"var(--green-dark)"}}>{w.tournName}</div>
                                        <div style={{fontSize:10,color:"var(--text2)"}}>{w.ustaId && <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"var(--green-dark)",opacity:.7,marginRight:4}}>{w.ustaId}</span>}{w.event}</div>
                                      </div>
                                      {w.link && <button onClick={(e)=>{e.stopPropagation();navigator.clipboard.writeText(w.link);setMsg({t:"s",m:"Waiver link copied!"})}} style={{padding:"4px 10px",border:"none",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700,background:"var(--green)",color:"#fff",whiteSpace:"nowrap",fontFamily:"'Outfit',sans-serif"}}>Copy Waiver</button>}
