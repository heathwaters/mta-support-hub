                                    </div>
                                    <div style={{display:"none",padding:"8px 12px",marginBottom:4,background:"rgba(255,255,255,.6)",borderRadius:6,border:"1px solid rgba(45,106,79,.15)"}} onClick={(e)=>e.stopPropagation()}>
                                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",fontSize:11,color:"var(--text2)"}}>
                                        <div><span style={{fontSize:9,color:"var(--text3)"}}>Dates</span><br/><strong>{w.dates}</strong></div>
                                        <div><span style={{fontSize:9,color:"var(--text3)"}}>Tourn ID</span><br/><strong style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>{w.tournId}</strong></div>
                                        {w.director && <div><span style={{fontSize:9,color:"var(--text3)"}}>Director</span><br/><strong>{w.director}</strong></div>}
                                        {w.directorEmail && <div><span style={{fontSize:9,color:"var(--text3)"}}>Email</span><br/><strong>{w.directorEmail}</strong></div>}
                                        <div style={{gridColumn:"1 / -1"}}>
                                          <span style={{fontSize:9,color:"var(--text3)"}}>Phone <span style={{opacity:.7}}>(used for event notifications)</span></span>
                                          <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
                                            <input type="tel" value={phEdit[w.tournId]??w.directorPhone??""}
                                              onChange={(e)=>setPhEdit({...phEdit,[w.tournId]:e.target.value})}
                                              placeholder="(no phone set)"
                                              style={{flex:1,padding:"4px 8px",border:"1px solid rgba(45,106,79,.3)",borderRadius:4,fontSize:11,fontFamily:"'JetBrains Mono',monospace",outline:"none",background:"#fff",color:"var(--text)"}} />
                                            <button onClick={()=>saveTournPhone(w.tournId)}
                                              disabled={phSaving===w.tournId||(phEdit[w.tournId]??w.directorPhone??"")===(w.directorPhone||"")}
                                              style={{padding:"4px 12px",border:"none",borderRadius:4,cursor:phSaving===w.tournId?"wait":"pointer",fontSize:10,fontWeight:700,background:"var(--green)",color:"#fff",opacity:(phSaving===w.tournId||(phEdit[w.tournId]??w.directorPhone??"")===(w.directorPhone||""))?.5:1,fontFamily:"'Outfit',sans-serif"}}>{phSaving===w.tournId?"Saving…":"Save"}</button>
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}

                            {/* Completed waivers */}
                            {pWv.length>0 && (
                              <div style={{padding:"8px 14px"}}>
                                <div style={{fontSize:9,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Completed Waivers ({pWv.length})</div>
                                {pWv.map((w,wi)=>(
                                  <div key={wi}>
                                    <div onClick={(e)=>{const d=e.currentTarget.nextSibling;if(d)d.style.display=d.style.display==="none"?"block":"none"}} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0",borderBottom:wi<pWv.length-1?"1px solid var(--border)":"none",fontSize:11,cursor:"pointer"}}>
                                      <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)",whiteSpace:"nowrap",minWidth:100}}>{w.dates.split(" — ")[0]||"—"}</div>
                                      <div style={{flex:1,color:"var(--text)"}}>{w.tournName} <span style={{color:"var(--text3)",fontSize:10}}>{w.event}</span></div>
                                      <span style={{fontSize:10,color:"var(--text3)",opacity:.4}}>▼</span>
                                    </div>
                                    <div style={{display:"none",padding:"8px 12px",marginBottom:4,background:"var(--bg)",borderRadius:6,border:"1px solid var(--border)"}}>
                                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",fontSize:11,color:"var(--text2)"}}>
                                        <div><span style={{fontSize:9,color:"var(--text3)"}}>Dates</span><br/><strong>{w.dates}</strong></div>
                                        <div><span style={{fontSize:9,color:"var(--text3)"}}>Tourn ID</span><br/><strong style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>{w.tournId}</strong></div>
                                        {w.director && <div><span style={{fontSize:9,color:"var(--text3)"}}>Director</span><br/><strong>{w.director}</strong></div>}
                                        {w.directorEmail && <div><span style={{fontSize:9,color:"var(--text3)"}}>Email</span><br/><strong>{w.directorEmail}</strong></div>}
                                      </div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                      </div>
                    </div>
                  )}

                  {/* ══════ ASSOCIATED ACCOUNTS — click to select ══════ */}
                  {r.relations && r.relations.length>0 && (
                    <div style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",overflow:"hidden",boxShadow:"var(--shadow)",marginBottom:12}}>
                      <div style={{padding:"10px 14px",background:"var(--purple-light)",borderBottom:"1px solid #DDD6FE"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"var(--purple)",fontFamily:"'Outfit',sans-serif"}}>👤 Associated Accounts — click the account in chat</div>
                      </div>
                      {r.relations.map((rel,i)=>(
                        <div key={i} onClick={()=>loadAccount(rel.id)}
                          style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                            borderBottom:i<r.relations.length-1?"1px solid var(--border)":"none",
                            cursor:"pointer",background:selAcct&&selAcct.id===rel.id?"var(--green-light)":"var(--card)",
                            transition:"background .15s"}}>
                          <span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600,background:"var(--purple-light)",color:"var(--purple)",textTransform:"capitalize",minWidth:60,textAlign:"center"}}>{rel.relation||"linked"}</span>
                          <div style={{flex:1}}>
                            <div style={{fontSize:12,fontWeight:600}}>{rel.name}</div>
                            <div style={{fontSize:10,color:"var(--text3)"}}>{rel.email}{(rel.city||rel.state)?" · "+[rel.city,rel.state].filter(Boolean).join(", "):""}</div>
                          </div>
                          <span style={{padding:"2px 8px",borderRadius:10,fontSize:9,fontWeight:600,
                            background:rel.status==="active"?"var(--green-light)":"var(--amber-light)",
                            color:rel.status==="active"?"var(--green-dark)":"var(--amber)"}}>{rel.status}</span>
                          <span style={{fontSize:12,color:"var(--green)",fontWeight:700}}>→</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* ══════ SELECTED ACCOUNT DETAILS ══════ */}
                  {selAcct && (
                    <div className="fade-in" style={{background:"var(--card)",borderRadius:12,border:"2px solid var(--green)",overflow:"hidden",boxShadow:"var(--shadow-lg)",marginBottom:12}}>
                      <div style={{padding:"12px 14px",background:"linear-gradient(135deg,#1B4332,#2D6A4F)",color:"#fff"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                          <div>
                            <div style={{fontSize:10,opacity:.6,textTransform:"uppercase",letterSpacing:".5px"}}>Selected Account</div>
                            <div style={{fontSize:16,fontWeight:700,fontFamily:"'Outfit',sans-serif",marginTop:2}}>{selAcct.name}</div>
                            <div style={{fontSize:11,opacity:.7}}>{selAcct.email}</div>
                            {selAcct.username && <div style={{fontSize:10,opacity:.5,marginTop:1}}>Username: {selAcct.username}</div>}
                          </div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {selAcct.role && selAcct.role!=="Player" && <span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,background:"rgba(109,40,217,.25)",color:"#C4B5FD"}}>{selAcct.role}</span>}
                            <span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,
                              background:selAcct.status==="active"?"rgba(134,239,172,.25)":"rgba(253,230,138,.25)",
                              color:selAcct.status==="active"?"#86EFAC":"#FDE68A"}}>{selAcct.status}</span>
                            <span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,
                              background:selAcct.verified?"rgba(134,239,172,.15)":"rgba(254,205,211,.25)",
                              color:selAcct.verified?"#86EFAC":"#FECDD3"}}>{selAcct.verified?"verified":"unverified"}</span>
                          </div>
                        </div>
                      </div>

                      <div style={{display:"flex",borderBottom:"1px solid var(--border)",fontSize:11}}>
                        <div style={{flex:1,padding:"8px 14px",borderRight:"1px solid var(--border)",textAlign:"center"}}>
                          <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase"}}>Failed Logins</div>
                          <div style={{fontSize:16,fontWeight:700,fontFamily:"'Outfit',sans-serif",color:selAcct.attempts>0?"var(--rose)":"var(--green-dark)",marginTop:2}}>{selAcct.attempts}</div>
                        </div>
                        <div style={{flex:1,padding:"8px 14px",borderRight:"1px solid var(--border)",textAlign:"center"}}>
                          <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase"}}>Location</div>
                          <div style={{fontSize:11,fontWeight:600,marginTop:2}}>{[selAcct.city,selAcct.state].filter(Boolean).join(", ")||"—"}</div>
                        </div>
                        <div style={{flex:1,padding:"8px 14px",textAlign:"center"}}>
                          <div style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase"}}>Since</div>
                          <div style={{fontSize:11,fontWeight:600,marginTop:2}}>{selAcct.created?selAcct.created.split(" ")[0]:"—"}</div>
                        </div>
                      </div>

                      <div style={{padding:"10px 14px",background:"#FAFBFA",borderBottom:"1px solid var(--border)",display:"flex",gap:8,flexWrap:"wrap"}}>
                        <button onClick={()=>{
                          const p=(r.players||[])[0]||{};
                          const ticket=[
                            "=== SUPPORT TICKET ===",
                            "Date: "+new Date().toLocaleString(),
                            "Account Name: "+selAcct.name,
                            "Email: "+selAcct.email,
                            "Account Status: "+selAcct.status,
                            "Location: "+[selAcct.city,selAcct.state].filter(Boolean).join(", "),
                            p.usta?"Player USTA#: "+p.usta:"",
                            p.section?"Section: "+p.section:"",
                            p.district?"District: "+p.district:"",
                            "","Issue: [describe issue here]","=== END TICKET ==="
                          ].filter(Boolean).join("\n");
                          navigator.clipboard.writeText(ticket);
                          setMsg({t:"s",m:"Ticket copied! Paste into tawk.to"});
                        }} style={{padding:"7px 14px",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,background:"var(--green-dark)",color:"#fff",fontFamily:"'Outfit',sans-serif"}}>
                          🎫 Copy Ticket to tawk.to
                        </button>
                        <button disabled style={{padding:"7px 14px",borderRadius:6,fontSize:11,fontWeight:700,border:"1px solid #FDE68A",background:"var(--amber-light)",color:"var(--amber)",cursor:"not-allowed",fontFamily:"'Outfit',sans-serif"}}>🔒 Reset Password</button>
                        <button disabled style={{padding:"7px 14px",borderRadius:6,fontSize:11,fontWeight:700,border:"1px solid #FDE68A",background:"var(--amber-light)",color:"var(--amber)",cursor:"not-allowed",fontFamily:"'Outfit',sans-serif"}}>🔒 Unlock Login</button>
                        <button disabled style={{padding:"7px 14px",borderRadius:6,fontSize:11,fontWeight:700,border:"1px solid #FDE68A",background:"var(--amber-light)",color:"var(--amber)",cursor:"not-allowed",fontFamily:"'Outfit',sans-serif"}}>🔒 Private</button>
                      </div>

                      {selAcct.adminNote && (
                        <div style={{padding:"6px 14px",background:"var(--amber-light)",fontSize:11,color:"var(--amber)"}}>
                          <strong>Note:</strong> {selAcct.adminNote}
                        </div>
                      )}
                    </div>
                  )}

                  {/* ── Ticket Reminder ── */}
                  <div style={{padding:"8px 14px",background:"var(--rose-light)",borderRadius:8,border:"1px solid #FECDD3",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11}}>🚫</span>
                    <div style={{fontSize:10,color:"var(--rose)",fontWeight:500}}>Create ticket in tawk.to for: billing, refunds, cancellations, merges, deletions, score edits</div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ══════ PLAYER SEARCH (MTA) ══════ */}
          {ap==="MTA" && (

function LoginForm({supa}){

  const[err,setErr]=useState(null);
  const[busy,setBusy]=useState(false);
  const submit=async(e)=>{
    e.preventDefault();setBusy(true);setErr(null);

          <p style={{margin:"4px 0 0",fontSize:12,color:"var(--text3)"}}>Virtual Assistant sign-in</p>
        </div>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:4}}>Email</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required autoFocus
          style={{width:"100%",padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,marginBottom:12,outline:"none",boxSizing:"border-box"}}/>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:4}}>Password</label>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} required
          style={{width:"100%",padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,marginBottom:14,outline:"none",boxSizing:"border-box"}}/>
        {err && <div style={{padding:"8px 12px",background:"var(--rose-light)",color:"var(--rose)",border:"1px solid #FECDD3",borderRadius:8,fontSize:12,marginBottom:12}}>{err}</div>}
        <button type="submit" disabled={busy} style={{width:"100%",padding:"11px",border:"none",borderRadius:8,background:"var(--green)",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif",cursor:busy?"wait":"pointer",opacity:busy?.7:1}}>

    </div>
  );
}

function AuthGate({children}){
  const[supa,setSupa]=useState(null);
  const[session,setSession]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    let sub;
    (async()=>{
      try{
        const cfg=await fetch("/api/config").then(r=>r.json());
        if(!cfg.supabaseUrl||!cfg.supabaseAnonKey){throw new Error("Supabase not configured");}
        const client=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);
        setSupa(client);
        const{data}=await client.auth.getSession();
        setSession(data.session);
        sub=client.auth.onAuthStateChange((_e,s)=>setSession(s)).data.subscription;
      }catch(e){console.error("auth init failed",e);}
      finally{setLoading(false);}
    })();
    return()=>sub&&sub.unsubscribe();
  },[]);
  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text3)",fontSize:14}}>Loading...</div>;
  if(!supa)return <div style={{padding:40,textAlign:"center",color:"var(--rose)"}}>Supabase is not configured. Contact admin.</div>;
  if(!session)return <LoginForm supa={supa}/>;
  return React.cloneElement(children,{supa,session});
}

            {supa && <button onClick={()=>supa.auth.signOut()} title={session?.user?.email||""} style={{padding:"7px 12px",border:"none",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'Outfit',sans-serif",background:"rgba(255,255,255,.1)",color:"#fff"}}>Sign Out</button>}
          </div>
        </div>
      </div>

      {tab==="kb" && <div>
        <div style={{background:"#FEF3C7",borderBottom:"2px solid #F59E0B",padding:"7px 16px",display:"flex",alignItems:"center",gap:8,fontSize:11,color:"#78350F"}}>
          <span style={{fontSize:14}}>⚡</span><div><strong>First:</strong> Check tawk.to URL → <code style={{background:"#FEF3C7",padding:"1px 6px",borderRadius:4,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>matchtennisapp.com</code> = MTA · <code style={{background:"#FEF3C7",padding:"1px 6px",borderRadius:4,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>matchtennisteam.com</code> = MTT</div>
        </div>
        <div style={{display:"flex",maxWidth:1600,margin:"0 auto",gap:0}}>
          {/* ── Left: Knowledge Base ── */}
          <div style={{flex:"1 1 55%",padding:"16px 20px",minWidth:0,maxHeight:"calc(100vh - 140px)",overflowY:"auto",borderRight:"2px solid var(--border)"}}>
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{display:"flex",background:"var(--card)",borderRadius:10,padding:3,border:"1px solid var(--border)"}}>
                {["MTA","MTT"].map(p=><button key={p} onClick={()=>{setProd(p);setCat("All");setExpanded(null)}} style={{padding:"8px 20px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",background:prod===p?"var(--green)":"transparent",color:prod===p?"#fff":"var(--text3)"}}>{p==="MTA"?"🎾 MTA ("+MTA_KB.length+")":"👥 MTT ("+MTT_KB.length+")"}</button>)}
              </div>
              <div style={{flex:1,minWidth:200,position:"relative"}}>
                <input ref={searchRef} type="text" placeholder="Search KB…  ⌘K" value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",padding:"10px 16px 10px 40px",border:"1px solid var(--border)",borderRadius:10,fontSize:13,outline:"none",boxSizing:"border-box",background:"var(--card)"}}
                  onFocus={e=>{e.target.style.borderColor="var(--green)"}} onBlur={e=>{e.target.style.borderColor="var(--border)"}} />
                <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:15,opacity:.4}}>🔍</span>
              </div>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
              <select value={cat} onChange={e=>setCat(e.target.value)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid var(--border)",fontSize:12,background:"var(--card)"}}>{cats.map(c=><option key={c} value={c}>{c==="All"?"All Categories":c}</option>)}</select>
              {[["All","All"],["LIVE","📖 KB Only"],["VA","⚠️ DB Required"]].map(([h,l])=><button key={h} onClick={()=>setHandler(h)} style={{padding:"5px 12px",border:"1px solid "+(handler===h?"var(--green)":"var(--border)"),borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:600,background:handler===h?"var(--green-light)":"var(--card)",color:handler===h?"var(--green-dark)":"var(--text3)"}}>{l}</button>)}
              <span style={{marginLeft:"auto",fontSize:11,color:"var(--text3)"}}>{results.length}</span>
            </div>
            {!Object.keys(groups).length?<div style={{textAlign:"center",padding:60,color:"var(--text3)"}}><div style={{fontSize:48,opacity:.5}}>🔍</div><div style={{fontSize:16,fontWeight:600}}>No results</div></div>
            :Object.entries(groups).map(([c,ents])=><div key={c} style={{marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--green-dark)",textTransform:"uppercase",letterSpacing:".8px",padding:"8px 0",marginBottom:6,borderBottom:"2px solid var(--green)",fontFamily:"'Outfit',sans-serif"}}>{c} <span style={{fontSize:10,color:"var(--text3)",background:"var(--bg)",padding:"2px 8px",borderRadius:10}}>{ents.length}</span></div>
              {ents.map((e,idx)=>{const uid=prod+e.id+"_"+idx;const open=expanded===uid;const isVA=e.h==="VA";return(
                <div key={uid} onClick={()=>{setExpanded(open?null:uid);setSection("customer")}} style={{background:"var(--card)",borderRadius:"var(--radius)",marginBottom:6,cursor:"pointer",border:open?"2px solid var(--green)":"1px solid var(--border)",boxShadow:open?"var(--shadow-lg)":"var(--shadow)"}}>
                  <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
                    <Badge bg={isVA?"var(--amber-light)":"var(--blue-light)"} color={isVA?"var(--amber)":"var(--blue)"}>{isVA?"DB Required":"KB Only"}</Badge>
                    <span style={{flex:1,fontSize:12,fontWeight:500}}>{e.q}</span>
                    {e.sc&&<span style={{fontSize:9,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",background:"var(--bg)",padding:"2px 6px",borderRadius:5}}>{e.sc}</span>}
                    <svg width="12" height="12" viewBox="0 0 12 12" style={{transform:open?"rotate(180deg)":"",transition:"transform .2s",opacity:.4}}><path d="M2 4L6 8L10 4" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>
                  </div>
                  {open&&<div className="fade-in" style={{padding:"0 14px 14px",borderTop:"1px solid var(--bg)"}} onClick={ev=>ev.stopPropagation()}>
                    <div style={{display:"flex",gap:4,margin:"10px 0",flexWrap:"wrap"}}>
                      {[["customer","💬","Response"],["va","🔧","Admin Notes"],["escalation","🎫","Escalation"],["followup","❓","Follow-Up"],["tips","💡","Tips"]].map(([k,ic,lb])=><button key={k} onClick={()=>setSection(k)} style={{padding:"5px 12px",border:"none",borderRadius:7,cursor:"pointer",fontSize:10,fontWeight:600,background:section===k?"var(--green-dark)":"var(--bg)",color:section===k?"#fff":"var(--text3)"}}>{ic} {lb}</button>)}
                    </div>
                    {section==="customer"&&e.cr&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:"var(--blue)",textTransform:"uppercase"}}>💬 Copy into tawk.to</span><CopyBtn text={e.cr} id={"c"+uid}/></div><div style={{background:"#F0F7FF",borderRadius:8,padding:12,fontSize:12,lineHeight:1.7,border:"1px solid #BFDBFE",whiteSpace:"pre-wrap"}}>{e.cr}</div></div>}
                    {section==="va"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:"var(--green)",textTransform:"uppercase"}}>🔧 Admin panel steps</span>{e.vr&&<CopyBtn text={e.vr} id={"v"+uid}/>}</div>{e.vr?<div style={{background:"#ECFDF5",borderRadius:8,padding:12,fontSize:12,lineHeight:1.7,border:"1px solid #A7F3D0",whiteSpace:"pre-wrap"}}>{e.vr}</div>:<div style={{background:"var(--bg)",borderRadius:8,padding:12,fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>No admin actions needed.</div>}</div>}
                    {section==="escalation"&&<div>{e.es&&!e.es.startsWith("N/A")?<div style={{background:"#FFFBEB",borderRadius:8,padding:12,fontSize:12,lineHeight:1.7,border:"1px solid #FDE68A",whiteSpace:"pre-wrap"}}>{e.es}</div>:<div style={{background:"var(--bg)",borderRadius:8,padding:12,fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>No escalation needed.</div>}</div>}
                    {section==="followup"&&<div>{e.fu?<div style={{background:"var(--purple-light)",borderRadius:8,padding:12,fontSize:12,lineHeight:1.7,border:"1px solid #DDD6FE",whiteSpace:"pre-wrap"}}>{e.fu}</div>:<div style={{background:"var(--bg)",borderRadius:8,padding:12,fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>No follow-up needed.</div>}</div>}
                    {section==="tips"&&<div>{e.at?<div style={{background:"var(--rose-light)",borderRadius:8,padding:12,fontSize:12,lineHeight:1.7,border:"1px solid #FECDD3",whiteSpace:"pre-wrap"}}>{e.at}</div>:<div style={{background:"var(--bg)",borderRadius:8,padding:12,fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>No tips.</div>}</div>}
                  </div>}
                </div>
              )})}
            </div>)}
          </div>

          {/* ── Right: Admin Panel ── */}
          <div style={{flex:"1 1 45%",minWidth:0,maxHeight:"calc(100vh - 140px)",overflowY:"auto",background:"var(--bg)"}}>
            <AdminPanel session={session} />
          </div>
        </div>
      </div>}


      {tab==="ticket"&&<div style={{maxWidth:640,margin:"0 auto",padding:24}}><div style={{background:"var(--card)",borderRadius:14,padding:28,border:"1px solid var(--border)",boxShadow:"var(--shadow-lg)"}}>
        <h2 style={{fontSize:20,fontWeight:700,fontFamily:"'Outfit',sans-serif",marginBottom:20}}>Create Support Ticket</h2>
        {TFIELDS.map(f=><div key={f.key} style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:4,textTransform:"uppercase"}}>{f.label} {f.required&&<span style={{color:"var(--rose)"}}>*</span>}</label>
          {f.opts?<select value={ticket[f.key]||""} onChange={e=>setTicket(p=>({...p,[f.key]:e.target.value}))} style={{width:"100%",padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box",background:"var(--card)"}}><option value="">Select…</option>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
          :f.ml?<textarea value={ticket[f.key]||""} onChange={e=>setTicket(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder} rows={3} style={{width:"100%",padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box",resize:"vertical"}}/>
          :<input type={f.type||"text"} value={ticket[f.key]||""} onChange={e=>setTicket(p=>({...p,[f.key]:e.target.value}))} placeholder={f.placeholder} style={{width:"100%",padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}/>}
        </div>)}
        <div style={{display:"flex",gap:8,marginTop:20}}>
          <button onClick={()=>{navigator.clipboard.writeText(ticketText());setCopied(true);setTimeout(()=>setCopied(false),2000)}} style={{flex:1,padding:12,border:"none",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"'Outfit',sans-serif",background:copied?"var(--green)":"var(--green-dark)",color:"#fff"}}>{copied?"✓ Copied":"Copy Ticket"}</button>
          <button onClick={()=>setTicket({})} style={{padding:"12px 20px",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,background:"var(--card)",color:"var(--text3)"}}>Clear</button>
        </div>
        {Object.values(ticket).some(v=>v)&&<pre style={{background:"var(--bg)",borderRadius:8,padding:16,fontSize:11,lineHeight:1.8,fontFamily:"'JetBrains Mono',monospace",color:"var(--text2)",whiteSpace:"pre-wrap",border:"1px solid var(--border)",marginTop:20,maxHeight:280,overflow:"auto"}}>{ticketText()}</pre>}
      </div></div>}

      {tab==="escalation"&&<div style={{maxWidth:640,margin:"0 auto",padding:24}}><div style={{background:"var(--card)",borderRadius:14,padding:28,border:"1px solid var(--border)"}}>
        <h2 style={{fontSize:20,fontWeight:700,fontFamily:"'Outfit',sans-serif",marginBottom:16}}>Escalation Flow</h2>
        {[{s:1,t:'Greet: ""',c:"var(--green-light)"},{s:2,t:"Check tawk.to URL: matchtennisapp.com = MTA, matchtennisteam.com = MTT",c:"var(--amber-light)"},{s:3,t:"Search the Knowledge Base for the question.",c:"var(--blue-light)"},{s:4,t:'KB Only: Copy response into chat. Follow up if needed.',c:"var(--blue-light)"},{s:5,t:'DB Required: Open Admin Panel, look up account, take action.',c:"var(--amber-light)"},{s:6,t:"Create Ticket",c:"var(--purple-light)"}].map((s,i)=><div key={s.s} style={{display:"flex",gap:14,position:"relative"}}>
          {i<5&&<div style={{position:"absolute",left:17,top:38,width:2,height:"calc(100% - 14px)",background:"var(--border)"}}/>}
          <div style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:s.c,fontWeight:700,fontSize:14,flexShrink:0,zIndex:1,fontFamily:"'Outfit',sans-serif"}}>{s.s}</div>
          <div style={{flex:1,paddingBottom:18,fontSize:13,lineHeight:1.6,color:"var(--text2)",paddingTop:7}}>{s.t}</div>
        </div>)}
      </div></div>}

      {tab==="guide"&&<div style={{maxWidth:700,margin:"0 auto",padding:24}}><div style={{background:"var(--card)",borderRadius:14,padding:28,border:"1px solid var(--border)"}}>
        <h2 style={{fontSize:20,fontWeight:700,fontFamily:"'Outfit',sans-serif",marginBottom:20}}>Quick Guide</h2>
        <div style={{background:"#FEF3C7",borderRadius:10,padding:16,border:"1px solid #FDE68A",fontSize:13,lineHeight:1.7,marginBottom:16}}>
          <strong>⚡ Which App?</strong> Check tawk.to URL:<br/>
          <code style={{background:"#FEF3C7",padding:"2px 8px",borderRadius:6,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>matchtennisapp.com</code> → MTA ·
          <code style={{background:"#FEF3C7",padding:"2px 8px",borderRadius:6,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>matchtennisteam.com</code> → MTT
        </div>
        <div style={{background:"var(--green-light)",borderRadius:10,padding:16,border:"1px solid #86EFAC",fontSize:12,lineHeight:1.8,marginBottom:16}}>
          <strong>📖 KB Only:</strong> Copy response into chat. No admin panel needed.<br/>
          <strong>⚠️ DB Required:</strong> Open Admin Panel tab, look up account, take action.<br/>
          <strong>🚫 Billing:</strong> Create a ticket immediately. Zero financial access.
        </div>
        <div style={{background:"var(--purple-light)",borderRadius:10,padding:16,border:"1px solid #DDD6FE",fontSize:12,lineHeight:1.8}}>
          <strong>Greeting:</strong> "Hi [name], thank you for contacting Match Tennis Support!"<br/><br/>
          <strong>Links:</strong> MTA: web.matchtennisapp.com · MTT: matchtennisteam.com/baseapp/<br/>
          USTA: customercare.usta.com (1-800-990-8782) · UTR code: PLAYTIME20
        </div>
      </div></div>}
    </div>
  );
}
ReactDOM.render(<AuthGate><App/></AuthGate>,document.getElementById("root"));
</script></body></html>
